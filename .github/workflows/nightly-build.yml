          Write-Host "(R) windows-shell-fallback applied (getDefaultShell now validates the resolved shell exists on PATH; falls back to cmd.exe)"

          # (Z) v2-workspace blank-pane fix + diagnostics. Upstream's
          #     v2-workspace/layout.tsx blanks the ENTIRE workspace content
          #     area (returns an empty <div className="flex h-full w-full"/>)
          #     whenever the v2Workspaces live query transiently returns
          #     undefined/empty with isReady=false — an Electric re-sync blip,
          #     no user action. The pane stays blank until a manual Ctrl+R
          #     remount. This violates upstream's own apps/desktop AGENTS.md
          #     rule 9 (cache-first: never blank existing data on !isReady).
          #     Fix holds the last resolved workspace for the current id across
          #     the transient (so panes don't blank) and logs the render
          #     decision via the [agent-dots] -> main.log forwarder. Idempotent
          #     + fail-fast. layout.tsx is pure upstream (no AI-patch overlap),
          #     so it only drifts if upstream edits this file — regenerate then.
          $bp = '../patches/v2-workspace-blank-fix.patch'
          if (-not (Test-Path $bp)) { Write-Error "(Z) missing $bp in patches repo"; exit 1 }
          $bpFile = 'apps/desktop/src/renderer/routes/_authenticated/_dashboard/v2-workspace/layout.tsx'
          if (-not (Test-Path $bpFile)) { Write-Error "(Z) missing $bpFile"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'lastResolvedWorkspaceRef' $bpFile) {
            Write-Host "(Z) v2-workspace blank-pane fix already present — skip"
          } else {
            git apply --check $bp 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Error "(Z) v2-workspace-blank-fix.patch does not apply cleanly — v2-workspace/layout.tsx changed upstream; aborting rather than shipping with the workspace-content blank-pane bug unfixed. Regenerate patches/v2-workspace-blank-fix.patch against the new upstream."
              exit 1
            }
            git apply $bp
            if ($LASTEXITCODE -ne 0) { Write-Error "(Z) git apply failed"; exit 1 }
          }
          if ((Get-Content -Raw $bpFile) -notmatch 'heldWorkspace') { Write-Error "(Z) heldWorkspace reference missing in layout.tsx after apply"; exit 1 }
          Write-Host "(Z) v2-workspace blank-pane fix applied (cache-first hold-last-good; blank-render decision logged via [agent-dots])"

          # (S) v2 terminal: await resolveLaunchShell. Upstream calls
          #     `const shell = resolveLaunchShell(baseEnv);` in
          #     packages/host-service/src/terminal/terminal.ts without await.
          #     resolveLaunchShell returns Promise<string>, so `shell` is a Promise
          #     that downstream path.basename(shell) rejects ("The 'path' argument
          #     must be of type string. Received an instance of Promise") — every v2
          #     "Claude"/"Open terminal" preset spawn fails. createTerminalSessionInternal
          #     is already `async`, so the fix is a one-token await.
          #     Applied by DETERMINISTIC REGEX, not git apply: terminal.ts is also
          #     edited by the non-deterministic AI patch step (Patch 15 \r-EOL etc.),
          #     which shifts the line-anchored patch's @@ context. The old git-apply
          #     guard HARD-ABORTED on a clean run (26374550323) purely from that drift,
          #     even though the target line was untouched. Regex keys off the line
          #     content, not line numbers, so AI edits elsewhere in the file no longer
          #     matter. Idempotent + fail-fast (still aborts if the line is gone —
          #     it's load-bearing). patches/v2-terminal-await-shell.patch retired.
          $tt = 'packages/host-service/src/terminal/terminal.ts'
          if (-not (Test-Path $tt)) { Write-Error "(S) missing $tt"; exit 1 }
          $c = Get-Content -Raw $tt
          if ($c -match 'const\s+shell\s*=\s*await\s+resolveLaunchShell\(baseEnv\)') {
            Write-Host "(S) v2 terminal already awaits resolveLaunchShell — skip"
          } elseif ($c -match '(const\s+shell\s*=\s*)resolveLaunchShell\(baseEnv\)') {
            $c = $c -replace '(const\s+shell\s*=\s*)resolveLaunchShell\(baseEnv\)', '${1}await resolveLaunchShell(baseEnv)'
            Set-Content -Path $tt -Value $c -NoNewline
            Write-Host "(S) v2-terminal-await-shell applied via regex (createTerminalSessionInternal now awaits the shell promise)"
          } else {
            Write-Error "(S) no 'const shell = resolveLaunchShell(baseEnv)' (awaited or not) in $tt — upstream shape changed; aborting rather than shipping with v2 terminal spawn broken."
            exit 1
          }
          $ttBody = Get-Content -Raw $tt
          if ($ttBody -notmatch 'const\s+shell\s*=\s*await\s+resolveLaunchShell\(baseEnv\)') { Write-Error "(S) await keyword missing on resolveLaunchShell call after fixup"; exit 1 }
          if ($ttBody -match 'const\s+shell\s*=\s*resolveLaunchShell\(baseEnv\)') { Write-Error "(S) un-awaited resolveLaunchShell call still present after fixup"; exit 1 }
          Write-Host "(S) v2 terminal awaits resolveLaunchShell (no Promise leak into path.basename)"

          # (T) hidden-window-watchdog — INLINE fixup (was a git-apply patch that
          #     drifted on the AI-edited main.ts load/crash handlers and hard-aborted,
          #     e.g. run 26487262015 at main.ts:323). The window is created
          #     `show: false` and only revealed by the did-finish-load/did-fail-load
          #     handlers; on Windows ARM64 we've seen launches where NEITHER fires
          #     (renderer crash mid-load, or a load/visibility race under
          #     superset-app://), leaving every Superset.exe alive but the window
          #     permanently hidden. This splices ADDITIVE webContents listeners
          #     (EventEmitter allows many) BEFORE the stable
          #     `window.webContents.on("did-finish-load"` registration instead of
          #     MODIFYING the AI-touched handler bodies — so it can't drift. Keeps the
          #     full watchdog: 12s force-show, one-time early-crash reload, and
          #     electron-log lifecycle logging. Depends only on `window` + `log` (in
          #     scope, used by W.1/AA.1/AB). Hard-aborts if the anchor is gone —
          #     re-anchor rather than ship without the watchdog.
          $hwFile = 'apps/desktop/src/main/windows/main.ts'
          if (-not (Test-Path $hwFile)) { Write-Error "(T) $hwFile missing in this upstream — aborting (every build must include the hidden-window watchdog)"; exit 1 }
          $hwAbs = (Resolve-Path $hwFile).Path
          $hwSnippet = Get-Content -Raw '../scripts/fixup-snippets/hidden-window-watchdog.snippet'
          if (-not $hwSnippet) { Write-Error "(T) missing scripts/fixup-snippets/hidden-window-watchdog.snippet"; exit 1 }
          $hwContent = [System.IO.File]::ReadAllText($hwAbs)
          if ($hwContent -match 'show-watchdog fired') {
            Write-Host "(T) hidden-window-watchdog already present — skip"
          } else {
            $hwAnchor = 'window.webContents.on("did-finish-load"'
            $hwIdx = $hwContent.IndexOf($hwAnchor)
            if ($hwIdx -lt 0) { Write-Error "(T) 'window.webContents.on(did-finish-load)' anchor not found in $hwFile — MainWindow load-handler shape changed; re-anchor (T) rather than ship without the hidden-window watchdog."; exit 1 }
            $hwContent = $hwContent.Insert($hwIdx, $hwSnippet)
            [System.IO.File]::WriteAllText($hwAbs, $hwContent, (New-Object System.Text.UTF8Encoding $false))
            $hwVerify = [System.IO.File]::ReadAllText($hwAbs)
            if ($hwVerify -notmatch 'show-watchdog fired') { Write-Error "(T) show-watchdog marker missing after insert"; exit 1 }
            if ($hwVerify -notmatch 'reloading renderer after early crash') { Write-Error "(T) early-crash reload marker missing after insert"; exit 1 }
            Write-Host "(T) hidden-window-watchdog inserted inline (additive listeners before did-finish-load; show-watchdog + early-crash reload + electron-log lifecycle logging)"
          }

          # (U) v2-cwd-fallback.patch — DISABLED 2026-05-22.
          #     The patch applied cleanly to apps/desktop/.../V2NotificationController.tsx
          #     in the build that became Superset-1.10.2-arm64.exe (10:27 UTC), but at
          #     runtime that build navigated to a v2-workspace route, fired
          #     `did-start-loading`, and NEVER reached `did-finish-load` — the renderer
          #     hung mid-mount of V2NotificationController, leaving terminals visible
          #     but with no live xterm bound to input ("can't type in terminal
          #     windows"). Reverted to the pre-(U) v1.10.2 build to recover.
          #
          #     The patch file `patches/v2-cwd-fallback.patch` is kept in the repo so
          #     the design (cwd → workspace via worktreePath cache, terminalId via
          #     pane-layout iteration) can be salvaged. Re-enabling requires running
          #     the patched controller in a real Superset render before any user-
          #     visible install — the runtime symptom didn't surface in `git apply
          #     --check` or in TS compile, and there was no clear error in
          #     `~/AppData/Roaming/Superset/logs/main.log`, so static checks alone
          #     can't catch it. Likely fixes to try: confirm `getHostServiceClientByUrl`
          #     and `workspace.get` are valid at runtime (not just types); confirm
          #     `useEffectEvent` calling another `useEffectEvent` is safe in this
          #     React version; consider moving the resolver to the main process so
          #     it's not in the renderer's mount path at all.

          # (V) xterm-screen-reader-mode.patch — DISABLED (kept in patches/ for
          #     reference, NOT applied). screenReaderMode: true was the ROOT CAUSE of
          #     Wispr Flow voice input silently no-op'ing into terminals.
          #     CONFIRMED 2026-05-27 in the shipped bundle: xterm's `_inputEvent`
          #     forwards programmatic insertText to the PTY ONLY when screenReaderMode
          #     is FALSE —
          #       if (e.data && e.inputType==="insertText" && (!e.composed||!_keyDownSeen)
          #           && !optionsService.rawOptions.screenReaderMode) { triggerDataEvent(...) }
          #     With the flag TRUE that guard is false, so Wispr's injected text is
          #     never sent to the shell. Physical keys (_keyDown path) and Ctrl+V
          #     (paste handler) take different paths, which is why they kept working
          #     while only voice injection died. xterm's DEFAULT (false) — the same
          #     setting VS Code's terminal ships, where Wispr Flow works — is correct.
          #     The earlier "without (V) Wispr fails" test (4b70111, 2026-05-26)
          #     PREDATED (AA.1) setAccessibilitySupportEnabled, so it failed for a
          #     DIFFERENT reason (no Electron a11y tree → textarea not UIA-reachable);
          #     (AA.1) now provides that reachability. UIA exposure comes from (AA.1),
          #     NOT from screenReaderMode. DO NOT re-enable (V) — it has been wrongly
          #     re-enabled twice already. Reverted 2026-05-27.

          # (X) terminal-tab-focus-trap.patch — DISABLED (kept in patches/ for
          #     reference, NOT applied). It existed ONLY to counteract a (V)
          #     side-effect: with screenReaderMode: true, xterm stopped cancelling
          #     Tab's default action, so Tab escaped the terminal. With (V) disabled,
          #     screenReaderMode is false and xterm cancels Tab natively again, so
          #     (X) is redundant. Reverted alongside (V) 2026-05-27.

          # (W) notification-logging.patch
          #     Pure additive diagnostic logging for the agent-status-dots
          #     pipeline (no behaviour/logic change). Applies AFTER (N) and
          #     (V): the hook Python string gains a _log() that appends one
          #     JSON line per invocation to ~/.superset/pane-map-hook.log
          #     (gated by SUPERSET_AGENT_WATCHER_DEBUG); the watcher gains an
          #     eventId join-key + mapping_load / enriched transition dbg
          #     records (~/.superset/agent-watcher-debug.log); main.ts gains a
          #     PRODUCTION console-message forwarder that persists renderer
          #     "[agent-dots]" lines to electron-log (main.log); and the
          #     renderer (V2NotificationController, lifecycleEvents, the
          #     v2-notifications store) emits "[agent-dots]" lifecycle /
          #     drop / transition / store-mutation records. Touches files (N)
          #     creates (pane-map-hook.ts, agent-jsonl-watcher.ts, main.ts)
          #     plus three renderer files (N) doesn't. Guard HARD-ABORTS on any
          #     apply failure — the agent-dots diagnostics ship in EVERY build.
          #     The main.ts [agent-dots] -> main.log forwarder (which (Z)'s
          #     blank-pane logging also relies on) is inserted DETERMINISTICALLY
          #     in (W.1) below (regex, NOT git apply): main.ts is AI-edited and a
          #     line-anchored hunk drifts — it failed build 26419405280 at
          #     main.ts:174. The rest of (W) (renderer files + (N)-created watcher
          #     files) stays git apply and applies cleanly.
          #
          # (W.1) main.ts forwarder — deterministic insert before the stable
          #       `if (ipcHandler) {` anchor in MainWindow(). Idempotent + fail-fast.
          #       UTF-8 (no BOM) round-trip so non-ASCII elsewhere in main.ts is safe.
          #
          # (AB) console-transport silence — also inserted here, in the same atomic
          #      block as the forwarder. Sets `log.transports.console.level = false`
          #      BEFORE attaching the forwarder so the `log.info(message)` call only
          #      writes to the file transport (~/AppData/Roaming/Superset/logs/main.log)
          #      and NOT to electron-log's console transport. Without this, every
          #      `[agent-dots]` line was being written to the main process's
          #      `process.stderr` (electron-log's default console transport uses
          #      stderr/stdout) — that output then leaked into external Claude Code
          #      TUI sessions running in the user's plain PowerShell windows whenever
          #      Superset's renderer emitted lifecycle events for that cwd's Claude
          #      session. The leak corrupted Claude's TUI rendering ("persistent cyan
          #      separator strokes", text not clearing, only resize fixes it). File
          #      logging continues normally so the dots-diagnostic pipeline (which
          #      relies on main.log) is unaffected. Codex xhigh root-caused this
          #      2026-05-26 + cited electron-log's documented `console.level = false`
          #      as the right disable switch. Both inserts verified after write.
          $wmain = 'apps/desktop/src/main/windows/main.ts'
          if (-not (Test-Path $wmain)) { Write-Error "(W.1) $wmain missing in this upstream"; exit 1 }
          $wmainAbs = (Resolve-Path $wmain).Path
          $wcontent = [System.IO.File]::ReadAllText($wmainAbs)
          if ($wcontent -match 'startsWith\("\[agent-dots\]"\)' -and $wcontent -match 'log\.transports\.console\.level\s*=\s*false') {
            Write-Host "(W.1)+(AB) main.ts [agent-dots] forwarder + console-silence already present — skip"
          } else {
            $wanchor = "`tif (ipcHandler) {"
            $widx = $wcontent.IndexOf($wanchor)
            if ($widx -lt 0) { Write-Error "(W.1) 'if (ipcHandler) {' anchor not found in main.ts — upstream shape changed; re-anchor the (W.1) inline insert rather than ship without the [agent-dots] forwarder."; exit 1 }
            $fwd = "`t// (AB) Silence electron-log's console transport so [agent-dots] lines do`n`t// NOT leak into any attached parent console / pipe / external Claude Code TUI.`n`t// Main.log file transport continues normally. Without this, [agent-dots] lines`n`t// emitted via log.info(message) below were corrupting external pwsh Claude`n`t// sessions' TUI rendering for this cwd's Claude sessions. Codex-confirmed`n`t// root cause 2026-05-26 via electron-log docs.`n`tlog.transports.console.level = false;`n`n`t// (W.1) Production diagnostic: persist renderer ""[agent-dots]"" console lines to`n`t// electron-log (main.log) so the agent-status-dots pipeline + the v2-workspace`n`t// blank-pane diagnostics survive a shipped build (no devtools session).`n`t// Logging only -- never alters behaviour. Inserted deterministically by (W.1)`n`t// because main.ts is AI-edited and a line-anchored hunk drifts.`n`twindow.webContents.on(`n`t`t""console-message"",`n`t`t(_event, _level, message) => {`n`t`t`ttry {`n`t`t`t`tif (typeof message === ""string"" && message.startsWith(""[agent-dots]"")) {`n`t`t`t`t`tlog.info(message);`n`t`t`t`t}`n`t`t`t} catch {`n`t`t`t`t// never let logging crash the main process`n`t`t`t}`n`t`t},`n`t);`n`n"
            $wcontent = $wcontent.Insert($widx, $fwd)
            [System.IO.File]::WriteAllText($wmainAbs, $wcontent, (New-Object System.Text.UTF8Encoding $false))
            $verifyContent = [System.IO.File]::ReadAllText($wmainAbs)
            if ($verifyContent -notmatch 'startsWith\("\[agent-dots\]"\)') { Write-Error "(W.1) [agent-dots] forwarder missing in main.ts after insert"; exit 1 }
            if ($verifyContent -notmatch 'log\.transports\.console\.level\s*=\s*false') { Write-Error "(AB) electron-log console-transport silencer missing in main.ts after insert"; exit 1 }
            Write-Host "(W.1)+(AB) main.ts [agent-dots] forwarder + console-transport silence inserted (deterministic, before if (ipcHandler))"
          }

          $nl = '../patches/notification-logging.patch'
          if (-not (Test-Path $nl)) { Write-Error "(W) missing $nl in patches repo"; exit 1 }
          $nlHook = 'apps/desktop/src/main/lib/agent-jsonl-watcher/pane-map-hook.ts'
          if (-not (Test-Path $nlHook)) { Write-Error "(W) $nlHook is missing in this upstream — aborting (did (N) apply? notification logging is mandatory)"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'pane-map-hook.log' $nlHook) {
            Write-Host "(W) notification logging already present — skip"
          } else {
            # Capture --check stderr (don't suppress) so a drift is diagnosable
            # from the build log. main.ts is the likely culprit: it carries AI
            # Patch 19 + inline (H) + (T) that this patch's context may not match.
            $wErr = "$env:RUNNER_TEMP/w-apply-check.txt"
            git apply --check $nl 2>$wErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(W) notification-logging.patch does not apply cleanly (post N+V). git apply --check output:"
              if (Test-Path $wErr) { Get-Content $wErr | ForEach-Object { Write-Host "    (W-check) $_" } }
              Write-Error "(W) notification-logging.patch failed to apply — ABORTING. Every build must include the agent-dots diagnostics. Regenerate/harden patches/notification-logging.patch against this upstream."
              exit 1
            }
            git apply $nl
            if ($LASTEXITCODE -ne 0) { Write-Error "(W) git apply failed after a clean --check"; exit 1 }
            if ((Get-Content -Raw $nlHook) -notmatch 'pane-map-hook\.log') { Write-Error "(W) pane-map-hook.log logging missing in $nlHook after apply"; exit 1 }
            Write-Host "(W) notification logging applied (hook -> ~/.superset/pane-map-hook.log; renderer [agent-dots] lines -> electron-log main.log)"
          }

          # (AA) wispr-flow — the LOAD-BEARING Wispr Flow fix (was "diag"), now that
          #      (V) screenReaderMode is reverted. Two coordinated inline fixups,
          #      both hard-abort:
          #      (AA.1) main.ts: app.setAccessibilitySupportEnabled(true) forces
          #             Electron to materialize its UI Automation tree on Windows.
          #             THIS is what makes the hidden xterm <textarea> reachable to
          #             Wispr Flow's UIA injection (IUIAutomationValuePattern /
          #             TextPattern) — independent of xterm's screenReaderMode (which
          #             must stay FALSE, see (V): with it true, xterm refuses to
          #             forward the injected insertText to the PTY). Without (AA.1)
          #             the textarea isn't in the UIA tree at all (the real reason
          #             the 2026-05-26 screenReaderMode-off test failed). Keyboard +
          #             Ctrl+V take xterm's keydown / paste paths, not UIA, so they
          #             always worked. Logs before/after a11y state via log.info
          #             (electron-log — main process, so console.log would NOT reach
          #             main.log; the (W.1) forwarder only relays renderer console).
          #      (AA.2) terminal-runtime.ts: instruments the v2 xterm textarea — logs
          #             textarea aria-* + every input/composition/key/focus event,
          #             snapshotted sync + microtask + rAF, a pass-through value-setter
          #             hook, and a document-level focusin UIA-profile scanner. Lets us
          #             VERIFY the fix (Wispr's insertText now reaches the PTY) and
          #             diff a working target vs the textarea. Logging only — no
          #             behavior change.
          #      Both rely on (W.1)'s main.ts forwarder being already inserted (it
          #      runs above), so the renderer [agent-dots] [wispr-diag] lines reach
          #      ~/AppData/Roaming/Superset/logs/main.log.
          # (AA.1) main.ts: enable Electron accessibility support + log state.
          #        Anchor: `\tif (ipcHandler) {` (same stable anchor (W.1) uses;
          #        (W.1) runs first, so (AA.1) inserts AFTER (W.1)'s forwarder code).
          $aaMain = 'apps/desktop/src/main/windows/main.ts'
          if (-not (Test-Path $aaMain)) { Write-Error "(AA.1) $aaMain missing in this upstream"; exit 1 }
          $aaMainAbs = (Resolve-Path $aaMain).Path
          $aaSnippet = Get-Content -Raw '../scripts/fixup-snippets/wispr-diag-main.snippet'
          if (-not $aaSnippet) { Write-Error "(AA.1) missing scripts/fixup-snippets/wispr-diag-main.snippet"; exit 1 }
          $aaContent = [System.IO.File]::ReadAllText($aaMainAbs)
          if ($aaContent -match 'setAccessibilitySupportEnabled\(true\)') {
            Write-Host "(AA.1) wispr-diag main.ts already present — skip"
          } else {
            $aaAnchor = "`tif (ipcHandler) {"
            $aaIdx = $aaContent.IndexOf($aaAnchor)
            if ($aaIdx -lt 0) { Write-Error "(AA.1) 'if (ipcHandler) {' anchor not found in $aaMain — upstream shape changed; re-anchor (AA.1) rather than ship without Wispr Flow / UIA support."; exit 1 }
            $aaContent = $aaContent.Insert($aaIdx, $aaSnippet)
            [System.IO.File]::WriteAllText($aaMainAbs, $aaContent, (New-Object System.Text.UTF8Encoding $false))
            if (([System.IO.File]::ReadAllText($aaMainAbs)) -notmatch 'setAccessibilitySupportEnabled\(true\)') { Write-Error "(AA.1) setAccessibilitySupportEnabled marker missing after insert"; exit 1 }
            Write-Host "(AA.1) main.ts setAccessibilitySupportEnabled(true) + wispr-diag accessibility logging inserted (deterministic, before if (ipcHandler))"
          }

          # (AA.2) terminal-runtime.ts: install renderer wispr-diag after the v2
          #        createTerminal()'s `terminal.loadAddon(serializeAddon);` anchor.
          #        Anchors independently on upstream code (does NOT depend on the now

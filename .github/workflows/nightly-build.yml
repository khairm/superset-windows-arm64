              if (Test-Path $wpErr) { Get-Content $wpErr | ForEach-Object { Write-Host "    (AK-check) $_" } }
              Write-Error "(AK) watcher-poll-fallback.patch failed to apply — agent-jsonl-watcher shape changed (N/W drift?). Regenerate it against post-(N)+(W) watcher (AK applies before AJ)."
              exit 1
            }
            git apply $wp
            if ($LASTEXITCODE -ne 0) { Write-Error "(AK) git apply failed after a clean --check"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'pollKnownTimer = setInterval' $wpFile)) { Write-Error "(AK) poll timer wiring missing after apply"; exit 1 }
            Write-Host "(AK) watcher-poll-fallback applied (poll catches fs.watch-missed appends/creates; dots reliable on Windows)"

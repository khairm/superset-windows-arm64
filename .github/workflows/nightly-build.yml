            Write-Host "(W) notification logging applied (hook -> ~/.superset/pane-map-hook.log; renderer [agent-dots] lines -> electron-log main.log)"
          }

          # ──────────────────────────────────────────────────────────────
          # (AH) workspace-delete-decouple — delete a workspace FIRST-TRY even
          #      when its git worktree is LOCKED on Windows. Upstream runDestroy()
          #      removes the worktree BEFORE the cloud + local-row delete and
          #      THROWS on a locked dir, aborting before the record is deleted ->
          #      the renderer's optimistic row-hide rolls back and the row
          #      reappears (the reported "delete twice" bug). This converts the
          #      two Step-2b throws into warnings (+ `git worktree prune`) so the
          #      record deletes first-try; the locked folder is left on disk and
          #      surfaced as a warning. RETIRES the rejected force-remove
          #      PATCHES.md Patch 30. workspace-cleanup.ts is touched by NO other
          #      patch, so this applies on pristine upstream.
          $wd = '../patches/workspace-delete-decouple.patch'
          $wdFile = 'packages/host-service/src/trpc/router/workspace-cleanup/workspace-cleanup.ts'
          if (-not (Test-Path $wd)) { Write-Error "(AH) missing $wd in patches repo"; exit 1 }
          if (-not (Test-Path $wdFile)) { Write-Error "(AH) $wdFile missing in this upstream — workspace-cleanup moved; re-anchor (AH)"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'the workspace was deleted and the folder left on disk' $wdFile) {
            Write-Host "(AH) workspace-delete-decouple already present — skip"
          } else {
            $wdErr = "$env:RUNNER_TEMP/ah-apply-check.txt"
            git apply --check $wd 2>$wdErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(AH) workspace-delete-decouple.patch does not apply cleanly. git apply --check output:"
              if (Test-Path $wdErr) { Get-Content $wdErr | ForEach-Object { Write-Host "    (AH-check) $_" } }
              Write-Error "(AH) workspace-delete-decouple.patch failed to apply — runDestroy() Step-2b shape changed upstream. Regenerate it (convert the worktree-remove + repo-open throws to warnings + prune) rather than shipping the delete-twice bug."
              exit 1
            }
            git apply $wd
            if ($LASTEXITCODE -ne 0) { Write-Error "(AH) git apply failed after a clean --check"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'the workspace was deleted and the folder left on disk' $wdFile)) { Write-Error "(AH) decouple warning missing after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch '"worktree", "prune"' $wdFile)) { Write-Error "(AH) git worktree prune missing after apply"; exit 1 }
            Write-Host "(AH) workspace-delete-decouple applied (locked worktree no longer aborts delete; record deletes first-try, folder left on disk with a warning)"
          }

          # (AK) watcher-poll-fallback — fs.watch (ReadDirectoryChangesW) on

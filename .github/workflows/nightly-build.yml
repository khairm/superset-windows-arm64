            if (-not (Select-String -Quiet -SimpleMatch 'pendingToolUseIds' $wnhWatch)) { Write-Error "(AS) (AP) markers absent — (AS) MUST apply after (AP); fix ordering"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'mergeAskHook' $wnhPane)) { Write-Error "(AS) (AQ) markers absent — (AS) MUST apply after (AQ); fix ordering"; exit 1 }
            $wnhErr = "$env:RUNNER_TEMP/as-apply-check.txt"
            git apply --check $wnh 2>$wnhErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(AS) windows-notify-hook.patch does not apply cleanly (post AP/AQ/AR). git apply --check output:"
              if (Test-Path $wnhErr) { Get-Content $wnhErr | ForEach-Object { Write-Host "    (AS-check) $_" } }
              Write-Error "(AS) windows-notify-hook.patch failed to apply — watcher/pane-map shape changed (N/AK/AJ/AN/AP/AQ drift). Regenerate it against the POST-(AP)+(AQ)+(AR) tree."
              exit 1
            }
            git apply $wnh
            if ($LASTEXITCODE -ne 0) { Write-Error "(AS) git apply failed after a clean --check"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'mergeNotifyHook' $wnhPane)) { Write-Error "(AS) mergeNotifyHook missing after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'superset-notify.py' $wnhPane)) { Write-Error "(AS) superset-notify script missing after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'claude-gated' $wnhWatch)) { Write-Error "(AS) Claude gate missing after apply"; exit 1 }
            if (Select-String -Quiet -SimpleMatch 'pendingToolUseIds' $wnhWatch) { Write-Error "(AS) (AP) heuristics still present after apply — patch did not retire System 1 for Claude"; exit 1 }
            Write-Host "(AS) windows-notify-hook applied (Claude dots event-driven via host-service POST; System 1 timing heuristics retired for Claude; Codex unchanged)"
          }

          # (AT) v2-dots-open-tabs — agent-status dots (AND the workspace icon
          #      status + unread badge) must represent ONLY currently-OPEN
          #      terminals. (P)'s per-terminal dots rendered one dot per
          #      `terminal:<id>` entry in the in-memory v2-notifications store
          #      with NO tab-gating, so a stale "review" entry emitted ONCE at
          #      startup for a terminal that was never opened as a tab became a
          #      permanent green "orphan" dot (proven: each stuck dot had a single
          #      None->review store mutation, never cleared, store is in-memory).
          #      This gates the three workspace-level selectors (NotificationStatus
          #      / TerminalStatuses / IsUnread) to terminal sources whose id
          #      belongs to an OPEN pane in the persisted v2 layout
          #      (`v2WorkspaceLocalState.paneLayout`, read via useLiveQuery — the
          #      SAME source V2NotificationController already reads). Safe form of
          #      the reverted (AI) prune: the signal is the renderer's OPEN-TABS
          #      registry, NOT JSONL session presence (which killed live-but-quiet
          #      dots). Render-time filter ONLY (no store mutation, no reconcile
          #      race); chat/manual sources untouched. store.ts ONLY; gating lives
          #      inside the useV2Workspace* hooks so all callers are unchanged.
          #      MUST apply AFTER (P)+(W)+(AR) (store.ts shape).
          $dot = '../patches/v2-dots-open-tabs.patch'
          $dotStore = 'apps/desktop/src/renderer/stores/v2-notifications/store.ts'
          if (-not (Test-Path $dot)) { Write-Error "(AT) missing $dot in patches repo"; exit 1 }
          if (-not (Test-Path $dotStore)) { Write-Error "(AT) $dotStore missing — v2-notifications store moved; re-anchor (AT)"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'useV2WorkspaceOpenTerminalIds' $dotStore) {
            Write-Host "(AT) v2-dots-open-tabs already present — skip"
          } else {
            if (-not (Select-String -Quiet -SimpleMatch 'selectV2WorkspaceTerminalStatuses' $dotStore)) { Write-Error "(AT) (P) markers absent — (AT) MUST apply after (P); fix ordering"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch '__supersetDotRenderLog' $dotStore)) { Write-Error "(AT) (AR) markers absent — (AT) MUST apply after (AR); fix ordering"; exit 1 }
            $dotErr = "$env:RUNNER_TEMP/at-apply-check.txt"
            git apply --check $dot 2>$dotErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(AT) v2-dots-open-tabs.patch does not apply cleanly (post P/W/AR). git apply --check output:"
              if (Test-Path $dotErr) { Get-Content $dotErr | ForEach-Object { Write-Host "    (AT-check) $_" } }
              Write-Error "(AT) v2-dots-open-tabs.patch failed to apply — v2-notifications store.ts shape changed (P/W/AR drift). Regenerate it against the POST-(P)+(W)+(AR) store.ts."
              exit 1
            }
            git apply $dot
            if ($LASTEXITCODE -ne 0) { Write-Error "(AT) git apply failed after a clean --check"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'useV2WorkspaceOpenTerminalIds' $dotStore)) { Write-Error "(AT) open-terminal gate hook missing after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'v2WorkspaceLocalState' $dotStore)) { Write-Error "(AT) paneLayout source (v2WorkspaceLocalState) missing after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'openTerminalIds' $dotStore)) { Write-Error "(AT) gating param missing after apply"; exit 1 }
            Write-Host "(AT) v2-dots-open-tabs applied (dots/icon/unread gated to OPEN terminals via v2WorkspaceLocalState.paneLayout; orphan green dots no longer representable)"
          }

          # (AU) v2-subagent-yellow-hold — keep a terminal WORKING (yellow) while
          #      its delegated BACKGROUND subagents run, instead of greening at the
          #      main agent's turn-end Stop. (AS) drives Claude dots via host-service
          #      POST; when the main agent launches background Task subagents and
          #      ends its turn, Claude fires Stop -> review (green) WHILE the
          #      subagents are still running (proven: Stop POST at turn-end + the
          #      JSONL subagent-mirror missed the new subagent files on Windows).
          #      This extends superset-notify.py with a NO-TIMER marker state machine
          #      keyed by the SubagentStart/SubagentStop agent_id pair key (markers
          #      under ~/.superset/agent-subagent-running/<terminalId>/ + a
          #      .mainstopped sentinel): SubagentStart -> Start; the main Stop is
          #      SUPPRESSED while any marker exists (sentinel set, stay yellow); the
          #      last SubagentStop greens iff main already stopped; SessionEnd clears
          #      all. Registers SubagentStart + SubagentStop in mergeNotifyHook.
          #      Safe failure mode (a leaked marker stays yellow, never false-green).
          #      pane-map-hook.ts ONLY; MUST apply AFTER (AS).
          $syh = '../patches/v2-subagent-yellow-hold.patch'
          $syhPane = 'apps/desktop/src/main/lib/agent-jsonl-watcher/pane-map-hook.ts'
          if (-not (Test-Path $syh)) { Write-Error "(AU) missing $syh in patches repo"; exit 1 }
          if (-not (Test-Path $syhPane)) { Write-Error "(AU) $syhPane missing — did (N) apply?"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'agent-subagent-running' $syhPane) {
            Write-Host "(AU) v2-subagent-yellow-hold already present — skip"
          } else {
            if (-not (Select-String -Quiet -SimpleMatch 'mergeNotifyHook' $syhPane)) { Write-Error "(AU) (AS) markers absent — (AU) MUST apply after (AS); fix ordering"; exit 1 }
            $syhErr = "$env:RUNNER_TEMP/au-apply-check.txt"
            git apply --check $syh 2>$syhErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(AU) v2-subagent-yellow-hold.patch does not apply cleanly (post AS). git apply --check output:"
              if (Test-Path $syhErr) { Get-Content $syhErr | ForEach-Object { Write-Host "    (AU-check) $_" } }
              Write-Error "(AU) v2-subagent-yellow-hold.patch failed to apply — pane-map-hook.ts shape changed (AS drift). Regenerate it against the POST-(AS) tree."
              exit 1
            }
            git apply $syh
            if ($LASTEXITCODE -ne 0) { Write-Error "(AU) git apply failed after a clean --check"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'agent-subagent-running' $syhPane)) { Write-Error "(AU) subagent marker dir missing after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch '_decide_event_type' $syhPane)) { Write-Error "(AU) decision fn missing after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'SubagentStart' $syhPane)) { Write-Error "(AU) SubagentStart registration missing after apply"; exit 1 }
            Write-Host "(AU) v2-subagent-yellow-hold applied (parent terminal holds yellow while background subagents run; greens on last SubagentStop)"
          }

          # (AY) shell-running blue dot — a pulsing BLUE dot per terminal (and a
          #      workspace-icon rollup) whenever a FOREGROUND command is running
          #      in the shell, detected from OSC 133 C (command-start) / D
          #      (command-end) markers; cleared instantly on finish; self-heals on
          #      the next 133;A prompt redraw if a D is missed. Precedence is
          #      agent > blue (permission > working > review > shell-running >
          #      idle) — blue only shows when NO agent status is present. Lives on
          #      a SEPARATE store axis (shellRunningTerminals), NOT a 5th
          #      PaneStatus, so agent aggregation is untouched; the precedence
          #      merge is render-time only (useV2WorkspaceDisplayStatus + the
          #      refactored useV2WorkspaceTerminalStatuses), reusing the (AT)
          #      useV2WorkspaceOpenTerminalIds gate so closed tabs are never
          #      representable. New byte-scanner packages/shared/.../
          #      shell-osc133-cd-scanner.ts mirrors the shell-ready scanner;
          #      host-service terminal.ts runs it after shell-ready and broadcasts
          #      command-start/-end via the widened terminal:lifecycle union; the
          #      renderer lifecycleEvents handler sets/clears the blue axis (no
          #      sound/notification). bash/zsh/fish wrappers + the v2 shell-launch
          #      fish init emit C (preexec) + D;<exit> (precmd), and a NEW separate
          #      superset-pwsh-integration.ps1 (written by createPwshWrapper, NOT a
          #      JS template literal) emits them for pwsh/powershell. MUST apply
          #      AFTER (AT)+(AU) (store.ts/sidebar shape). Authored against the
          #      reconstructed post-stack tree; pure event-driven, no timers.
          $sr = '../patches/shell-running-dots.patch'
          $srScan = 'packages/shared/src/shell-osc133-cd-scanner.ts'
          $srTerm = 'packages/host-service/src/terminal/terminal.ts'
          $srStore = 'apps/desktop/src/renderer/stores/v2-notifications/store.ts'
          if (-not (Test-Path $sr)) { Write-Error "(AY) missing $sr in patches repo"; exit 1 }
          if (-not (Test-Path $srTerm)) { Write-Error "(AY) $srTerm missing in this upstream — re-anchor (AY)"; exit 1 }
          if (Test-Path $srScan) {
            Write-Host "(AY) shell-running-dots already present — skip"
          } else {
            if (-not (Select-String -Quiet -SimpleMatch 'useV2WorkspaceOpenTerminalIds' $srStore)) { Write-Error "(AY) (AT) markers absent — (AY) MUST apply after (AT); fix ordering"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'agent-subagent-running' 'apps/desktop/src/main/lib/agent-jsonl-watcher/pane-map-hook.ts')) { Write-Error "(AY) (AU) markers absent — (AY) MUST apply after (AU); fix ordering"; exit 1 }
            $srErr = "$env:RUNNER_TEMP/ay-apply-check.txt"
            git apply --check $sr 2>$srErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(AY) shell-running-dots.patch does not apply cleanly (post AT/AU). git apply --check output:"
              if (Test-Path $srErr) { Get-Content $srErr | ForEach-Object { Write-Host "    (AY-check) $_" } }
              Write-Error "(AY) shell-running-dots.patch failed to apply — store.ts/sidebar/shell-launch/terminal shape changed (P/W/AR/AT/AU or upstream drift). Regenerate it against the POST-(AT)+(AU) tree (reconstruct: pristine 1.12.1 + the [git] stack through AT/AU, then git diff)."
              exit 1
            }
            git apply $sr
            if ($LASTEXITCODE -ne 0) { Write-Error "(AY) git apply failed after a clean --check"; exit 1 }
            if (-not (Test-Path $srScan)) { Write-Error "(AY) shell-osc133-cd-scanner.ts missing after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'scanForOsc133Cd' $srScan)) { Write-Error "(AY) scanForOsc133Cd missing in scanner after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'scanForOsc133Cd' $srTerm)) { Write-Error "(AY) terminal.ts not wired to scanForOsc133Cd after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'shellRunningTerminals' $srStore)) { Write-Error "(AY) shellRunningTerminals store axis missing after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'superset-pwsh-integration.ps1' 'apps/desktop/src/main/lib/agent-setup/shell-wrappers.ts')) { Write-Error "(AY) pwsh integration wrapper missing after apply"; exit 1 }
            Write-Host "(AY) shell-running-dots applied (OSC 133 C/D -> blue shell-running dot; separate store axis, agent>blue precedence, gated to open tabs; pwsh/bash/zsh/fish)"
          }

          # (F) Stage the deterministic Bun-store native-payload repair script
          #     (root-cause fix for electron-builder's Bun collector on win-arm64)
          #     from this patches repo into the upstream clone.
          $mat = '../scripts/materialize-native-closure.sh'
          if (-not (Test-Path $mat)) { Write-Error "Missing $mat in patches repo"; exit 1 }
          New-Item -ItemType Directory -Force scripts | Out-Null
          Copy-Item $mat 'scripts/materialize-native-closure.sh' -Force
          Write-Host "(F) staged scripts/materialize-native-closure.sh"

          Write-Host "ARM64 arch fixup verified (A + B + C + D + E + G + H + I + J + K + AE + AF + L + M + M2 + AV + AW + N + P + AG + Q + R + S + T + W + W.1 + AA + AB + AC + AD + Y + Z + AO + AN + AP + AQ + AR + AS + AT + AU + AY + F). (AE/AF/AG = non-git workspaces; M2 = before-quit Windows gate, AV = webgl render recovery [replaces retired AI Patch 20], AW = red-over-yellow dot precedence [subagent keep-alive yields to a pending AskUserQuestion]; AY = shell-running blue dot [OSC 133 C/D]; O retired -> v2-only via AD; U, V, X disabled — see comments above; V/X were the Wispr Flow regression, AC is the Wispr Flow paste fix.)"

          # Reaching here means EVERY patch/fixup applied — ALL guards now
          # hard-abort (Write-Error + exit 1) on any failure, so a build either
          # contains the complete patch set or fails loudly. There are no
          # skip-not-abort guards anymore: every build = latest upstream + the
          # full set (L M N O P Q R S T V X W Y Z), never partial. A trailing
          # `git apply --check`/Get-Content can leave $LASTEXITCODE=1 even on
          # success, so force a clean exit to reflect "all fixups applied".
          exit 0

      - name: Install dependencies
        working-directory: superset
        shell: bash
        env:
          # Skip the flaky @electron/rebuild postinstall (install:deps). On
          # win-arm64 it can't build native trustedDeps; the deterministic
          # Bun-store payload repair (below) handles them instead. This matches
          # the sequence validated on real ARM64 hardware.
          SUPERSET_POSTINSTALL_RUNNING: '1'
        run: |
          # Resilient `bun install`. Upstream's bunfig sets
          # minimumReleaseAge (72h); a fresh upstream release can pin deps
          # published inside that window, which makes `bun install` fail
          # loud (e.g. the whole expo stack: "No version matching ...
          # blocked by minimum-release-age"). That is a timing race, not a
          # breakage — an older version of each package is already aged
          # past the gate. On such a failure we resolve every blocked
          # package to its latest aged-safe version (<= upstream's pin) via
          # scripts/resolve-release-age.mjs and retry, so the nightly never
          # has to wait a night for packages to age. Any OTHER install
          # failure fails the step immediately — no masking.
          log="$RUNNER_TEMP/bun-install.log"
          for attempt in 1 2 3 4 5; do
            echo "::group::bun install (attempt $attempt)"
            if bun install 2>&1 | tee "$log"; then
              echo "::endgroup::"
              echo "bun install succeeded on attempt $attempt."
              exit 0
            fi
            echo "::endgroup::"
            if ! grep -q "minimum-release-age" "$log"; then
              echo "::error::bun install failed for a reason other than minimum-release-age."
              exit 1
            fi
            echo "Detected minimum-release-age block(s); resolving to aged-safe versions..."
            node ../scripts/resolve-release-age.mjs "$log"
          done
          echo "::error::Still blocked by minimum-release-age after 5 attempts."
          exit 1

      - name: Generate file icons
        working-directory: superset/apps/desktop
        shell: bash
        run: bun run generate:icons

      - name: Build app
        working-directory: superset/apps/desktop
        shell: bash
        run: bun run compile:app

      # Post-compile hard-fail: confirm (V) screenReaderMode stayed FALSE in BOTH
      # the v1 (config-*.js) and v2 (terminal-runtime-*.js) built renderer chunks.
      # (V) is now DISABLED (it was the Wispr Flow root cause — see the (V) comment
      # in the patch-fixup step). This guard is INVERTED from its old form: it
      # hard-aborts if screenReaderMode is truthy, so the regression can never
      # silently come back. A missing/absent flag is fine (xterm defaults false);
      # an explicit `screenReaderMode: false` is also fine.
      - name: Verify (V) screenReaderMode stayed false in both v1 and v2 renderer bundles
        working-directory: superset/apps/desktop
        shell: bash
        run: |
          set -euo pipefail
          assets_dir="dist/renderer/assets"
          [ -d "$assets_dir" ] || { echo "::error::renderer assets dir not found at $assets_dir"; exit 1; }
          v1_chunk=$(ls -1 "$assets_dir"/config-*.js 2>/dev/null | head -1 || true)
          v2_chunk=$(ls -1 "$assets_dir"/terminal-runtime-*.js 2>/dev/null | head -1 || true)
          [ -n "$v1_chunk" ] || { echo "::error::v1 config-*.js chunk not found in $assets_dir (renderer build layout changed?)"; exit 1; }
          [ -n "$v2_chunk" ] || { echo "::error::v2 terminal-runtime-*.js chunk not found in $assets_dir (renderer build layout changed?)"; exit 1; }
          echo "v1 chunk: $v1_chunk"
          echo "v2 chunk: $v2_chunk"
          # Hard-abort if screenReaderMode is truthy (`true` or minified `!0`) in either chunk.
          if grep -qE 'screenReaderMode[[:space:]]*:[[:space:]]*(true|!0)' "$v1_chunk"; then
            echo "::error::(V) screenReaderMode is TRUTHY in v1 chunk $v1_chunk — (V) must stay disabled; screenReaderMode:true is the Wispr Flow regression"
            grep -n screenReaderMode "$v1_chunk" || true
            exit 1
          fi
          if grep -qE 'screenReaderMode[[:space:]]*:[[:space:]]*(true|!0)' "$v2_chunk"; then
            echo "::error::(V) screenReaderMode is TRUTHY in v2 chunk $v2_chunk — (V) must stay disabled; screenReaderMode:true is the Wispr Flow regression"
            grep -n screenReaderMode "$v2_chunk" || true
            exit 1
          fi
          echo "(V) verified disabled in both renderer bundles — screenReaderMode is false, so xterm forwards Wispr Flow's insertText to the PTY."

      - name: Fetch @libsql + @anush008/tokenizers win32-arm64 + materialize native closure
        working-directory: superset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # libsql version Superset resolved (Turso publishes no win-arm64 build;
          # khairm/libsql-windows-arm64 publishes a per-version Release of it).
          LV=$(ls -d node_modules/.bun/libsql@* 2>/dev/null | sed 's#.*/libsql@##' | sort -V | tail -1)
          [ -n "$LV" ] || { echo "::error::could not determine resolved libsql version"; exit 1; }
          echo "Resolved libsql: $LV"
          rm -rf libsql-dl libsql-arm64
          if ! gh release download "$LV" --repo khairm/libsql-windows-arm64 \
                 -p 'libsql-win32-arm64-msvc.tar.gz' -p 'libsql-win32-arm64-msvc.tar.gz.sha256' -D libsql-dl; then
            echo "::error::No @libsql/win32-arm64-msvc Release for libsql $LV in khairm/libsql-windows-arm64."
            echo "::error::Trigger that repo's nightly (workflow_dispatch -f libsql_version=$LV) then re-run."
            exit 1
          fi
          ( cd libsql-dl && sha256sum -c libsql-win32-arm64-msvc.tar.gz.sha256 )
          mkdir -p libsql-arm64
          tar -xzf libsql-dl/libsql-win32-arm64-msvc.tar.gz -C libsql-arm64
          [ -f libsql-arm64/index.node ] || { echo "::error::libsql artifact missing index.node"; exit 1; }

          # @anush008/tokenizers version Superset resolved (fastembed dep; the
          # author publishes no win-arm64 build — khairm/tokenizers-windows-arm64
          # publishes a per-version Release of it). N-API: one build, any Electron.
          TV=$(ls -d node_modules/.bun/@anush008+tokenizers@* 2>/dev/null | sed 's#.*/@anush008+tokenizers@##' | sort -V | tail -1)
          [ -n "$TV" ] || { echo "::error::could not determine resolved @anush008/tokenizers version"; exit 1; }
          echo "Resolved @anush008/tokenizers: $TV"
          rm -rf tok-dl tokenizers-arm64
          if ! gh release download "$TV" --repo khairm/tokenizers-windows-arm64 \
                 -p 'tokenizers-win32-arm64-msvc.tar.gz' -p 'tokenizers-win32-arm64-msvc.tar.gz.sha256' -D tok-dl; then
            echo "::error::No @anush008/tokenizers-win32-arm64-msvc Release for tokenizers $TV in khairm/tokenizers-windows-arm64."
            echo "::error::Trigger that repo's nightly (workflow_dispatch -f tokenizers_version=$TV) then re-run."
            exit 1
          fi
          ( cd tok-dl && sha256sum -c tokenizers-win32-arm64-msvc.tar.gz.sha256 )
          mkdir -p tokenizers-arm64
          tar -xzf tok-dl/tokenizers-win32-arm64-msvc.tar.gz -C tokenizers-arm64
          [ -f tokenizers-arm64/tokenizers.win32-arm64-msvc.node ] || { echo "::error::tokenizers artifact missing .node"; exit 1; }

          # Electron NODE_MODULE_VERSION (V8 ABI) for the resolved electron.
          # better-sqlite3 is V8-ABI-bound (not N-API): a WRONG ABI fetches a
          # prebuilt that crashes Electron ("compiled against a different
          # Node.js version"), and the only post-download check is a PE-arch
          # assert that cannot detect an ABI mismatch. The old `EM + 103` was
          # linear and correct ONLY at Electron 40 (40+103=143); the real
          # node-abi map is non-linear (38->139, 39->140, 40->143, 41->145,
          # 42->146). Derive authoritatively: prefer node-abi against the
          # resolved FULL electron version, fall back to a pinned map, and
          # HARD-FAIL on an unknown major (never silently guess).
          EM=$(ls -d node_modules/.bun/electron@* 2>/dev/null | sed 's#.*/electron@##' | cut -d. -f1 | sort -n | tail -1)
          EV=$(ls -d node_modules/.bun/electron@* 2>/dev/null | sed 's#.*/electron@##' | sort -V | tail -1)
          [ -n "$EM" ] || { echo "::error::could not determine resolved electron version"; exit 1; }
          ABI=$(node -e "try{process.stdout.write(String(require('node-abi').getAbi('$EV','electron')))}catch(e){}" 2>/dev/null || true)
          if printf '%s' "$ABI" | grep -Eq '^[0-9]+$'; then
            echo "ABI from node-abi getAbi('$EV','electron') = $ABI"
          else
            case "$EM" in
              36) ABI=135;; 37) ABI=136;; 38) ABI=139;; 39) ABI=140;; 40) ABI=143;; 41) ABI=145;; 42) ABI=146;;
              *) echo "::error::Unknown Electron major $EM and node-abi unavailable — add its NODE_MODULE_VERSION (node-abi getAbi('$EV','electron')) to the ABI map in nightly-build.yml"; exit 1;;
            esac
            echo "ABI from pinned map (node-abi unavailable) = $ABI"
          fi
          echo "electron version=$EV major=$EM -> ABI=$ABI"
          export ELECTRON_ABI="$ABI" LIBSQL_ARM64_DIR="$PWD/libsql-arm64" TOKENIZERS_ARM64_DIR="$PWD/tokenizers-arm64"
          bash scripts/materialize-native-closure.sh
          # persist for later steps
          echo "ELECTRON_ABI=$ABI" >> "$GITHUB_ENV"
          echo "LIBSQL_ARM64_DIR=$PWD/libsql-arm64" >> "$GITHUB_ENV"
          echo "TOKENIZERS_ARM64_DIR=$PWD/tokenizers-arm64" >> "$GITHUB_ENV"

      - name: Prepare native modules (ARM64 target)
        working-directory: superset/apps/desktop
        shell: bash
        env:
          TARGET_ARCH: arm64
          TARGET_PLATFORM: win32
        run: bun run copy:native-modules

      - name: Validate native runtime (ARM64 fail-fast gate)
        working-directory: superset
        shell: bash
        env:
          TARGET_ARCH: arm64
          TARGET_PLATFORM: win32
        run: |
          set -euo pipefail
          # copy:native-modules can rewrite the @libsql dir — re-assert (idempotent).
          bash scripts/materialize-native-closure.sh
          cd apps/desktop
          bun run validate:native-runtime

      - name: Build Windows ARM64 installer
        working-directory: superset/apps/desktop
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Native modules that @electron/rebuild compiles FROM SOURCE (e.g.
          # native-keymap@3.3.9) use V8 APIs Electron 40 deprecated
          # (v8::Object::GetAlignedPointerFromInternalField). MSVC emits C4996
          # and these modules build with warnings-as-errors, so node-gyp fails
          # ("node-gyp failed to rebuild 'native-keymap'", run 26488351649). The
          # API still works at runtime in Electron 40 — this is a deprecation, not
          # a removal. cl.exe reads the CL env var and prepends it to every compile,
          # so /wd4996 disables just that one warning for ALL native rebuilds
          # (deterministic fix; a prior build happened to use a prebuilt and dodged
          # the source compile, but the float can't be relied on). Harmless to the
          # other native modules, which already compiled clean.
          CL: '/wd4996'
        run: |
          set -euo pipefail
          npx electron-builder --win --arm64 --publish never --config electron-builder.ts
          echo "--- release dir ---"
          ls -la release || true

      - name: Verify packaged native closure (ARM64 fail-fast gate)
        working-directory: superset/apps/desktop
        shell: bash
        run: |
          set -euo pipefail
          # The unpacked app electron-builder produced before NSIS packaging.
          APP="release/win-arm64-unpacked"
          [ -d "$APP" ] || { echo "::error::$APP not found"; exit 1; }
          pearch() { od -An -tx1 -j"$(( $(od -An -tu4 -j60 -N4 "$1"|tr -d ' ')+4 ))" -N2 "$1" | tr -d ' '; }
          fail=0
          # 1) Superset.exe must be native ARM64.
          m="$(pearch "$APP/Superset.exe")"
          [ "$m" = 64aa ] && echo "OK  Superset.exe ARM64" || { echo "::error::Superset.exe not ARM64 (0x$m)"; fail=1; }
          # 2) @anush008/tokenizers-win32-arm64-msvc must be packaged (extraResources,
          #    outside the asar) — this is the gap that crashed prior builds.
          TOK="$APP/resources/node_modules/@anush008/tokenizers-win32-arm64-msvc/tokenizers.win32-arm64-msvc.node"
          if [ -f "$TOK" ] && [ "$(pearch "$TOK")" = 64aa ]; then
            echo "OK  @anush008/tokenizers-win32-arm64-msvc packaged (ARM64)"
          else
            echo "::error::@anush008/tokenizers-win32-arm64-msvc missing/!ARM64 at $TOK"; fail=1
          fi
          # 3) Every win32-arm64 native .node in the unpacked app must be ARM64,
          #    and no win32-arm64 path may contain an x64 binary.
          while IFS= read -r f; do
            case "$f" in
              *darwin*|*linux*|*musl*|*win32-ia32*|*win32-x64*|*win32_x64*|*win32_ia32*) continue ;;
            esac
            a="$(pearch "$f" 2>/dev/null || echo '')"
            if echo "$f" | grep -Eqi 'win32.?arm64|win32_arm64'; then
              [ "$a" = 64aa ] || { echo "::error::win32-arm64 native not ARM64: $f (0x$a)"; fail=1; }
            fi
          done < <(find "$APP/resources" -name '*.node' 2>/dev/null)
          [ "$fail" = 0 ] || { echo "::error::packaged native closure verification FAILED"; exit 1; }
          echo "Packaged native closure verified (ARM64)."

      - name: Archive patched source
        shell: bash
        run: tar -czf superset-patched-source.tar.gz --exclude='node_modules' --exclude='.bun' --exclude='dist' --exclude='release' superset/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.upstream_version }}"
          RELEASE_TAG="${{ needs.check.outputs.release_tag }}"
          IS_BETA="${{ needs.check.outputs.is_beta }}"

          PRERELEASE_FLAG=""
          TITLE_SUFFIX=""
          if [ "$IS_BETA" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
            TITLE_SUFFIX=" [Beta]"
            # Delete existing beta release if it exists so we can recreate it
            gh release delete "$RELEASE_TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true
            git push --delete origin "refs/tags/$RELEASE_TAG" 2>/dev/null || true
          fi

          # electron-builder emits an -arm64 .exe artifact; resolve it resiliently.
          ASSET=$(ls superset/apps/desktop/release/*arm64*.exe 2>/dev/null | head -1 || true)
          if [ -z "$ASSET" ]; then
            ASSET=$(ls superset/apps/desktop/release/*.exe 2>/dev/null | grep -v blockmap | head -1 || true)
          fi
          if [ -z "$ASSET" ]; then
            echo "ERROR: no .exe produced in release/"
            ls -la superset/apps/desktop/release || true
            exit 1
          fi
          echo "Publishing asset: $ASSET"

          gh release create "$RELEASE_TAG" \
            "$ASSET" \
            superset-patched-source.tar.gz \
            --repo ${{ github.repository }} \
            --title "Superset $VERSION (Windows ARM64)${TITLE_SUFFIX}" \
            $PRERELEASE_FLAG \
            --notes "Automated **native Windows ARM64** build of [superset-sh/superset](https://github.com/superset-sh/superset) $VERSION.

          Built with Windows compatibility patches applied via AI agent (see [PATCHES.md](https://github.com/${{ github.repository }}/blob/main/PATCHES.md)). ARM64 native-module values are enforced deterministically by the workflow's *ARM64 arch fixup* step. Installer is **unsigned**.

          **Assets:**
          - \`$(basename "$ASSET")\` — native Windows ARM64 installer
          - \`superset-patched-source.tar.gz\` — modified source code (for reviewing the AI-applied changes against the upstream tag)

          Not the official superset-sh distribution."

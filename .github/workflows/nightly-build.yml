          # (AA) wispr-flow — the LOAD-BEARING Wispr Flow fix (was "diag"), now that
          #      (V) screenReaderMode is reverted. Two coordinated inline fixups,
          #      both hard-abort:
          #      (AA.1) main.ts: app.setAccessibilitySupportEnabled(true) forces
          #             Electron to materialize its UI Automation tree on Windows.
          #             THIS is what makes the hidden xterm <textarea> reachable to
          #             Wispr Flow's UIA injection (IUIAutomationValuePattern /
          #             TextPattern) — independent of xterm's screenReaderMode (which
          #             must stay FALSE, see (V): with it true, xterm refuses to
          #             forward the injected insertText to the PTY). Without (AA.1)
          #             the textarea isn't in the UIA tree at all (the real reason
          #             the 2026-05-26 screenReaderMode-off test failed). Keyboard +
          #             Ctrl+V take xterm's keydown / paste paths, not UIA, so they
          #             always worked. Logs before/after a11y state via log.info
          #             (electron-log — main process, so console.log would NOT reach
          #             main.log; the (W.1) forwarder only relays renderer console).
          #      (AA.2) terminal-runtime.ts: instruments the v2 xterm textarea — logs
          #             textarea aria-* + every input/composition/key/focus event,
          #             snapshotted sync + microtask + rAF, a pass-through value-setter
          #             hook, and a document-level focusin UIA-profile scanner. Lets us
          #             VERIFY the fix (Wispr's insertText now reaches the PTY) and
          #             diff a working target vs the textarea. Logging only — no
          #             behavior change.
          #      Both rely on (W.1)'s main.ts forwarder being already inserted (it
          #      runs above), so the renderer [agent-dots] [wispr-diag] lines reach
          #      ~/AppData/Roaming/Superset/logs/main.log.
          # (AA.1) main.ts: enable Electron accessibility support + log state.
          #        Anchor: `\tif (ipcHandler) {` (same stable anchor (W.1) uses;
          #        (W.1) runs first, so (AA.1) inserts AFTER (W.1)'s forwarder code).
          $aaMain = 'apps/desktop/src/main/windows/main.ts'
          if (-not (Test-Path $aaMain)) { Write-Error "(AA.1) $aaMain missing in this upstream"; exit 1 }
          $aaMainAbs = (Resolve-Path $aaMain).Path
          $aaSnippet = Get-Content -Raw '../scripts/fixup-snippets/wispr-diag-main.snippet'
          if (-not $aaSnippet) { Write-Error "(AA.1) missing scripts/fixup-snippets/wispr-diag-main.snippet"; exit 1 }
          $aaContent = [System.IO.File]::ReadAllText($aaMainAbs)
          if ($aaContent -match 'setAccessibilitySupportEnabled\(true\)') {
            Write-Host "(AA.1) wispr-diag main.ts already present — skip"
          } else {
            $aaAnchor = "`tif (ipcHandler) {"
            $aaIdx = $aaContent.IndexOf($aaAnchor)
            if ($aaIdx -lt 0) { Write-Error "(AA.1) 'if (ipcHandler) {' anchor not found in $aaMain — upstream shape changed; re-anchor (AA.1) rather than ship without Wispr Flow / UIA support."; exit 1 }
            $aaContent = $aaContent.Insert($aaIdx, $aaSnippet)
            [System.IO.File]::WriteAllText($aaMainAbs, $aaContent, (New-Object System.Text.UTF8Encoding $false))
            if (([System.IO.File]::ReadAllText($aaMainAbs)) -notmatch 'setAccessibilitySupportEnabled\(true\)') { Write-Error "(AA.1) setAccessibilitySupportEnabled marker missing after insert"; exit 1 }
            Write-Host "(AA.1) main.ts setAccessibilitySupportEnabled(true) + wispr-diag accessibility logging inserted (deterministic, before if (ipcHandler))"
          }

          # (AA.2) terminal-runtime.ts: install renderer wispr-diag after the v2
          #        createTerminal()'s `terminal.loadAddon(serializeAddon);` anchor.
          #        Anchors independently on upstream code (does NOT depend on the now
          #        -disabled (V)). Logs every textarea event (sync/microtask/rAF) +
          #        a value-setter hook + a document-level focusin UIA-profile scanner.
          $aaTr = 'apps/desktop/src/renderer/lib/terminal/terminal-runtime.ts'
          if (-not (Test-Path $aaTr)) { Write-Error "(AA.2) $aaTr missing in this upstream"; exit 1 }
          $aaTrAbs = (Resolve-Path $aaTr).Path
          $aaTrSnippet = Get-Content -Raw '../scripts/fixup-snippets/wispr-diag-renderer.snippet'
          if (-not $aaTrSnippet) { Write-Error "(AA.2) missing scripts/fixup-snippets/wispr-diag-renderer.snippet"; exit 1 }
          $aaTrContent = [System.IO.File]::ReadAllText($aaTrAbs)
          if ($aaTrContent -match 'installWisprDiag') {
            Write-Host "(AA.2) wispr-diag renderer already present — skip"
          } else {
            $aaTrAnchor = "`tterminal.loadAddon(serializeAddon);"
            $aaTrIdx = $aaTrContent.IndexOf($aaTrAnchor)
            if ($aaTrIdx -lt 0) { Write-Error "(AA.2) 'terminal.loadAddon(serializeAddon);' anchor not found in $aaTr — upstream shape changed; re-anchor (AA.2)"; exit 1 }
            $aaTrInsertAt = $aaTrIdx + $aaTrAnchor.Length + 1
            $aaTrContent = $aaTrContent.Insert($aaTrInsertAt, $aaTrSnippet)
            [System.IO.File]::WriteAllText($aaTrAbs, $aaTrContent, (New-Object System.Text.UTF8Encoding $false))
            if (([System.IO.File]::ReadAllText($aaTrAbs)) -notmatch 'installWisprDiag') { Write-Error "(AA.2) installWisprDiag marker missing after insert"; exit 1 }
            Write-Host "(AA.2) terminal-runtime.ts wispr-diag instrumentation inserted (deterministic, after terminal.loadAddon(serializeAddon))"
          }

          # (AC) windows-terminal-paste — make SYNTHETIC Ctrl+V paste in the terminal.
          #      Wispr Flow voice dictation copies its transcript to the clipboard then
          #      sends an OS-level SendInput Ctrl+V. Superset's terminal paste relies on
          #      the browser keydown->`paste` event (shouldBubbleClipboardShortcut, gated
          #      on event.code === "KeyV"), which Chrome only fires for TRUSTED REAL keys;
          #      synthetic keys fall through and xterm encodes ^V (0x16) into the PTY
          #      (Codex reads that as paste-image -> "failed to paste image"). Splices a
          #      Ctrl+V branch into the SHARED createTerminalKeyEventHandler (covers v1 +
          #      v2; both call installTerminalKeyEventHandler) just BEFORE its final
          #      `return true;`, so the branch runs ONLY for a Ctrl+V the clipboard-bubble
          #      check did NOT already handle — i.e. the synthetic case — leaving the
          #      (user-confirmed perfectly working) MANUAL Ctrl+V path untouched. Reads
          #      via navigator.clipboard.readText() (same API as right-click Paste; the
          #      sandboxed renderer has NO electron clipboard bridge) and terminal.paste()s
          #      the text. [wispr-diag]-instrumented so we can verify the intercept +
          #      readText result in main.log. Hard-aborts if the anchor is gone —
          #      regenerate rather than ship without terminal paste for voice input.
          $acFile = 'apps/desktop/src/renderer/lib/terminal/terminal-key-event-handler.ts'
          if (-not (Test-Path $acFile)) { Write-Error "(AC) $acFile missing in this upstream — re-anchor windows-terminal-paste for the new layout"; exit 1 }
          $acAbs = (Resolve-Path $acFile).Path
          $acSnippet = Get-Content -Raw '../scripts/fixup-snippets/windows-terminal-paste.snippet'
          if (-not $acSnippet) { Write-Error "(AC) missing scripts/fixup-snippets/windows-terminal-paste.snippet"; exit 1 }
          $acContent = [System.IO.File]::ReadAllText($acAbs)
          if ($acContent -match 'win-paste-intercept') {
            Write-Host "(AC) windows-terminal-paste already present — skip"
          } else {
            $acAnchor = "`n`t`treturn true;"
            $acIdx = $acContent.IndexOf($acAnchor)
            if ($acIdx -lt 0) { Write-Error "(AC) handler-final 'return true;' anchor not found in $acFile — createTerminalKeyEventHandler shape changed; re-anchor (AC) rather than ship without terminal paste for Wispr Flow voice input."; exit 1 }
            $acContent = $acContent.Insert($acIdx + 1, $acSnippet + "`n")
            [System.IO.File]::WriteAllText($acAbs, $acContent, (New-Object System.Text.UTF8Encoding $false))
            if (([System.IO.File]::ReadAllText($acAbs)) -notmatch 'win-paste-intercept') { Write-Error "(AC) win-paste-intercept marker missing after insert"; exit 1 }
            Write-Host "(AC) windows-terminal-paste inserted (deterministic, before createTerminalKeyEventHandler's final return true)"
          }

          # (Y) windows-force-foreground.patch
          #     focusMainWindow() (the second-instance / deep-link handler) did only
          #     show()+focus(), which Windows' foreground lock ignores — so
          #     relaunching Superset while its window was buried in z-order surfaced
          #     nothing (the window is visible per IsWindowVisible, just behind the
          #     app that holds the foreground; needed a manual Win32 raise to recover).
          #     Adds a brief always-on-top pin (exempt from the lock) to force the
          #     window to the top on Windows. Guard HARD-ABORTS on any apply
          #     failure — every build must include force-foreground; regenerate
          #     the patch on drift rather than ship without it.
          #     Marker: 'Windows holds a foreground lock'.
          $ff = '../patches/windows-force-foreground.patch'
          if (-not (Test-Path $ff)) { Write-Error "(Y) missing $ff in patches repo"; exit 1 }
          $ffFile = 'apps/desktop/src/main/index.ts'
          if (-not (Test-Path $ffFile)) { Write-Error "(Y) $ffFile is missing in this upstream — aborting; regenerate patches/windows-force-foreground.patch for the new layout"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'Windows holds a foreground lock' $ffFile) {
            Write-Host "(Y) force-foreground already present — skip"
          } else {
            $yErr = "$env:RUNNER_TEMP/y-apply-check.txt"
            git apply --check $ff 2>$yErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(Y) windows-force-foreground.patch does not apply cleanly. git apply --check output:"
              if (Test-Path $yErr) { Get-Content $yErr | ForEach-Object { Write-Host "    (Y-check) $_" } }
              Write-Error "(Y) windows-force-foreground.patch failed to apply — ABORTING. Regenerate patches/windows-force-foreground.patch against this upstream."
              exit 1
            }
            git apply $ff
            if ($LASTEXITCODE -ne 0) { Write-Error "(Y) git apply failed after a clean --check"; exit 1 }
            if ((Get-Content -Raw $ffFile) -notmatch 'setAlwaysOnTop') { Write-Error "(Y) setAlwaysOnTop missing in $ffFile after apply"; exit 1 }
            Write-Host "(Y) windows-force-foreground applied (focusMainWindow raises past the Windows foreground lock; relaunch now surfaces a buried window)"
          }

          # (AO) Windows agent-hook bash-wrap. Gemini + Cursor write their hook
          #      `command` as a raw `~/.superset/hooks/<agent>-hook.sh` path; on
          #      Windows the agent CLI ShellExecutes that `.sh`, so instead of
          #      RUNNING it the file opens in the user's default `.sh` editor (the
          #      "random text file pops open" bug). buildAgentHookCommand wraps the
          #      script in Git-for-Windows bash (bin/bash.exe sets up MSYS so the
          #      hook's grep/sed/curl resolve; forward-slash path; NEVER System32
          #      WSL bash, which can't read C:/ paths). When no Git bash is found it
          #      returns null and reconcile writes no managed entry AND drops any
          #      stale raw-.sh entry — self-healing, no popup. POSIX behaviour is
          #      byte-for-byte unchanged. Copilot is intentionally excluded: it uses
          #      a project-level `bash:`-field hook (different exec model) — verify
          #      that separately before wrapping it. Touches agent-setup files no
          #      other patch touches, so it anchors on pure upstream.
          $ag = '../patches/windows-agent-hook-bash-wrap.patch'
          if (-not (Test-Path $ag)) { Write-Error "(AO) missing $ag in patches repo"; exit 1 }
          $acFile = 'apps/desktop/src/main/lib/agent-setup/agent-wrappers-common.ts'
          if (-not (Test-Path $acFile)) { Write-Error "(AO) $acFile missing in this upstream -- re-anchor patches/windows-agent-hook-bash-wrap.patch"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'buildAgentHookCommand' $acFile) {
            Write-Host "(AO) windows-agent-hook-bash-wrap already present -- skip"
          } else {
            $aoErr = "$env:RUNNER_TEMP/ao-apply-check.txt"
            git apply --check $ag 2>$aoErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(AO) windows-agent-hook-bash-wrap.patch does not apply cleanly. git apply --check output:"
              if (Test-Path $aoErr) { Get-Content $aoErr | ForEach-Object { Write-Host "    (AO-check) $_" } }
              Write-Error "(AO) windows-agent-hook-bash-wrap.patch failed to apply -- ABORTING. agent-wrappers-{common,gemini,cursor}.ts changed upstream; re-anchor patches/windows-agent-hook-bash-wrap.patch against the new upstream."
              exit 1
            }
            git apply $ag
            if ($LASTEXITCODE -ne 0) { Write-Error "(AO) git apply failed after a clean --check"; exit 1 }
            if (-not ((Get-Content -Raw $acFile).Contains('buildAgentHookCommand'))) { Write-Error "(AO) buildAgentHookCommand missing in $acFile after apply"; exit 1 }
            $agFile = 'apps/desktop/src/main/lib/agent-setup/agent-wrappers-gemini.ts'
            if (-not ((Get-Content -Raw $agFile).Contains('buildAgentHookCommand(hookScriptPath)'))) { Write-Error "(AO) gemini wrapper not rewired in $agFile after apply"; exit 1 }
            $auFile = 'apps/desktop/src/main/lib/agent-setup/agent-wrappers-cursor.ts'
            if (-not ((Get-Content -Raw $auFile).Contains('buildAgentHookCommand(hookScriptPath, hookArg)'))) { Write-Error "(AO) cursor wrapper not rewired in $auFile after apply"; exit 1 }
            Write-Host "(AO) windows-agent-hook-bash-wrap applied (Gemini+Cursor hooks run via Git bash on Windows; no more .sh editor popup)"
          }

          # (AN) Startup-stall fix + boot phase logging + blocked-event-loop guard.
          #      ROOT CAUSE (multi-agent trace + I/O measurement): the agent-dots
          #      watcher did BLOCKING fs work on the main thread at startup, starving
          #      the renderer's superset-app:// protocol handler so the window stayed
          #      blank for minutes ("watchdog cleared but never fired"; renderer JS
          #      never ran). TWO blockers: (1) a SYNCHRONOUS ~8 KB-header seed over
          #      ~11k ~/.claude + ~/.codex files (~5 min cold); (2) the 12 s discover
          #      poll synchronously REPLAYED every first-seen file's full body (~5.6 GB)
          #      when it raced the seed (~9 min). Fix: async (fs.promises) seed + the
          #      discover poll held until the seed tails every file to EOF, then it
          #      only touches genuinely-new files.
          #      Plus boot phase-timing logs + a renderer [boot-renderer] marker + an
          #      event-loop lag monitor, so any future stall lands in one labeled phase
          #      in main.log. Applies LAST (after every inline fixup + git patch) against
          #      the fully-patched tree; re-anchor against superset-patched-source.tar.gz
          #      if the boot code shape changes upstream.
          $sf2 = '../patches/startup-stall-fix.patch'
          if (-not (Test-Path $sf2)) { Write-Error "(AN) missing $sf2 in patches repo"; exit 1 }
          $awFile = 'apps/desktop/src/main/lib/agent-jsonl-watcher/agent-jsonl-watcher.ts'
          if (-not (Test-Path $awFile)) { Write-Error "(AN) $awFile missing in this upstream -- regenerate patches/startup-stall-fix.patch"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'seedScanAllAsync' $awFile) {
            Write-Host "(AN) startup-stall-fix already present -- skip"
          } else {
            $anErr = "$env:RUNNER_TEMP/an-apply-check.txt"
            git apply --check $sf2 2>$anErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(AN) startup-stall-fix.patch does not apply cleanly. git apply --check output:"
              if (Test-Path $anErr) { Get-Content $anErr | ForEach-Object { Write-Host "    (AN-check) $_" } }
              Write-Error "(AN) startup-stall-fix.patch failed to apply -- ABORTING. Boot/startup code shape changed upstream; re-anchor patches/startup-stall-fix.patch against the fully-patched source."
              exit 1
            }
            git apply $sf2
            if ($LASTEXITCODE -ne 0) { Write-Error "(AN) git apply failed after a clean --check"; exit 1 }
            if (-not ((Get-Content -Raw $awFile).Contains('seedScanAllAsync'))) { Write-Error "(AN) seedScanAllAsync missing in $awFile after apply"; exit 1 }
            $ixFile = 'apps/desktop/src/main/index.ts'
            if (-not ((Get-Content -Raw $ixFile).Contains('[boot] awaiting app.whenReady'))) { Write-Error "(AN) [boot] whenReady marker missing in $ixFile after apply"; exit 1 }
            $rxFile = 'apps/desktop/src/renderer/index.tsx'
            if (-not ((Get-Content -Raw $rxFile).Contains('boot-renderer'))) { Write-Error "(AN) [boot-renderer] marker missing in $rxFile after apply"; exit 1 }
            Write-Host "(AN) startup-stall-fix applied (non-blocking seed scan + boot phase logging + event-loop lag guard)"
          }

          # (AP) watcher-dot-accuracy — three dot-correctness fixes on the watcher,
          #      layered AFTER (AN) (which also rewrites the watcher seed/poll):
          #      (1) track open tool_use ids (pendingToolUseIds) so the 45s idle
          #      fallback never flips a terminal to review (GREEN) while a
          #      shell/build/Task tool is still running — the "green dot while
          #      working / yellow won't stick" bug; (2) read the AskUserQuestion
          #      marker dir (~/.superset/agent-ask-pending, written by the (AQ) hook)
          #      and drive permission (RED) -> working deterministically, bypassing
          #      JSONL read lag (the question line can be read tens of seconds late
          #      on Windows); (3) mirror BACKGROUND subagent activity
          #      (<cwd>/<sessionId>/subagents/agent-*.jsonl) to the PARENT terminal so
          #      it stays YELLOW while subagents run even after the main agent emitted
          #      Stop. Authored against the POST-(AN) watcher.
          $wpt = '../patches/watcher-pending-tools.patch'
          $wptFile = 'apps/desktop/src/main/lib/agent-jsonl-watcher/agent-jsonl-watcher.ts'

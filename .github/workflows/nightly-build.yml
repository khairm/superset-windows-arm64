name: Nightly Windows ARM64 Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream desktop-vX.Y.Z to build (overrides auto-detected Latest; leave blank to use upstream Latest).'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * *'  # 12:00 AM UTC daily

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      upstream_version: ${{ steps.compare.outputs.upstream_version }}
      is_beta: ${{ steps.compare.outputs.is_beta }}
      release_tag: ${{ steps.compare.outputs.release_tag }}
    steps:
      - name: Check upstream for new release
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"
          TAG_INPUT="${{ github.event.inputs.tag }}"

          # Manual override (workflow_dispatch input) wins over upstream Latest.
          # Lets a manual build pin a known-good tag (e.g. desktop-v1.10.2) when
          # upstream's Latest pointer flip-flops to an older release whose source
          # shape doesn't fit the v2-era patches (P/Q/R/S/T target 1.10.x).
          # Empty input on schedule/nightly -> falls through to the gh-release lookup,
          # preserving the original auto-detect behavior unchanged.
          if [ -n "$TAG_INPUT" ]; then
            echo "Manual tag override: $TAG_INPUT"
            LATEST="$TAG_INPUT"
          else
            LATEST=$(gh release view --repo superset-sh/superset --json tagName -q .tagName 2>/dev/null || echo "")
          fi
          if [ -z "$LATEST" ]; then
            echo "No upstream release found"
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "is_beta=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "upstream_version=$LATEST" >> $GITHUB_OUTPUT

          # Check if we already have this version
          if gh release view "$LATEST" --repo ${{ github.repository }} &>/dev/null; then
            echo "Already built $LATEST"
            if [ "$IS_MANUAL" = "true" ]; then
              echo "Manual trigger: building beta pre-release"
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "is_beta=true" >> $GITHUB_OUTPUT
              echo "release_tag=${LATEST}-beta" >> $GITHUB_OUTPUT
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "is_beta=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "New version found: $LATEST"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "release_tag=$LATEST" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    # Native Windows ARM64 runner (free for public repos).
    runs-on: windows-11-arm
    steps:
      - name: Checkout patches repo
        uses: actions/checkout@v5

      - name: Clone upstream Superset
        shell: bash
        run: |
          git config --global core.longpaths true
          git clone --depth 1 --branch ${{ needs.check.outputs.upstream_version }} https://github.com/superset-sh/superset.git superset

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun (native Windows ARM64)
        uses: oven-sh/setup-bun@v2
        with:
          # 1.3.14 = last stable Zig release; first native win-arm64 shipped in 1.3.10.
          # (Avoid the Rust canary; it does not claim Windows ARM64 parity.)
          bun-version: '1.3.14'

      - name: Verify Bun is native ARM64 (fail fast, fall back to official zip)
        shell: pwsh
        run: |
          function Get-PEMachine($p){ $fs=[IO.File]::OpenRead($p); $br=New-Object IO.BinaryReader($fs); $fs.Position=0x3C; $pe=$br.ReadInt32(); $fs.Position=$pe+4; $m=$br.ReadUInt16(); $br.Close(); return $m }
          $bun = (Get-Command bun).Source
          $m = Get-PEMachine $bun
          $ver = (& bun --version).Trim()
          Write-Host "bun: $bun  version=$ver  PEmachine=0x$('{0:X}' -f $m)"
          if ($m -ne 0xAA64) {
            Write-Host "::warning::setup-bun did not provide native ARM64 bun (machine 0x$('{0:X}' -f $m)); downloading official bun-windows-aarch64"
            $zip = Join-Path $env:RUNNER_TEMP 'bun-arm64.zip'
            Invoke-WebRequest -Uri 'https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-windows-aarch64.zip' -OutFile $zip
            $dest = Join-Path $env:RUNNER_TEMP 'bun-arm64'
            Expand-Archive -Path $zip -DestinationPath $dest -Force
            $found = Get-ChildItem -Recurse -Filter bun.exe $dest | Select-Object -First 1
            if (-not $found) { Write-Error 'bun.exe not found in official ARM64 zip'; exit 1 }
            $m2 = Get-PEMachine $found.FullName
            if ($m2 -ne 0xAA64) { Write-Error "Official zip bun.exe is not ARM64 (0x$('{0:X}' -f $m2))"; exit 1 }
            Add-Content -Path $env:GITHUB_PATH -Value $found.DirectoryName
            Write-Host "Prepended native ARM64 bun ($($found.DirectoryName)) to PATH"
          }

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Apply Windows patches
        working-directory: superset
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DISABLE_NON_ESSENTIAL_MODEL_CALLS: '1'
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
        shell: bash
        run: |
          # Retry up to 3 times on transient API/socket failures. The
          # Anthropic API occasionally drops the streaming socket from
          # GitHub Actions Windows runners ("API Error: The socket
          # connection was closed unexpectedly") — a fresh CLI invocation
          # immediately after almost always succeeds. Use a 30s backoff
          # between attempts to let any rate-limit or pool exhaustion
          # recover. If all three attempts fail we surface the original
          # exit code and let the build abort.
          PROMPT='IMPORTANT: Do NOT enter plan mode. Do NOT use EnterPlanMode. Apply all changes directly and immediately.

          You are inside a fresh clone of superset-sh/superset. Read the file ../PATCHES.md and apply ALL the patches described in it to this codebase. Read each target file before editing. Create new files where specified. Do not skip any patch.'
          attempt=1
          max=3
          backoff=30
          rc=1
          while [ $attempt -le $max ]; do
            echo "::group::claude attempt $attempt/$max"
            if claude --dangerously-skip-permissions --effort medium --verbose -p "$PROMPT"; then
              rc=0
              echo "::endgroup::"
              break
            fi
            rc=$?
            echo "::endgroup::"
            echo "::warning::claude attempt $attempt failed with exit $rc"
            if [ $attempt -lt $max ]; then
              echo "Sleeping ${backoff}s before retry…"
              sleep $backoff
            fi
            attempt=$((attempt + 1))
          done
          exit $rc

      - name: Pin Mastra dependencies
        working-directory: superset
        shell: bash
        run: |
          node <<'NODE'
          import { existsSync, readdirSync, readFileSync, writeFileSync } from "node:fs";
          import { join, relative } from "node:path";

          const pins = {
            "@mastra/core": "1.33.0",
            mastracode: "0.18.0",
          };
          const dependencySections = ["dependencies", "devDependencies", "optionalDependencies"];
          const searchRoots = ["apps", "packages", "tooling"];
          const packageJsonFiles = ["package.json"];

          function collectPackageJsonFiles(directory) {
            if (!existsSync(directory)) return;

            for (const entry of readdirSync(directory, { withFileTypes: true })) {
              const entryPath = join(directory, entry.name);

              if (entry.isDirectory()) {
                if ([".git", ".bun", "dist", "node_modules", "release"].includes(entry.name)) continue;
                collectPackageJsonFiles(entryPath);
                continue;
              }

              if (entry.name === "package.json") {
                packageJsonFiles.push(entryPath);
              }
            }
          }

          for (const root of searchRoots) collectPackageJsonFiles(root);

          const changes = [];
          for (const file of packageJsonFiles) {
            const packageJson = JSON.parse(readFileSync(file, "utf8"));
            let changed = false;

            if (file === "package.json") {
              packageJson.overrides ??= {};
              for (const [name, version] of Object.entries(pins)) {
                if (packageJson.overrides[name] !== version) {
                  packageJson.overrides[name] = version;
                  changes.push(`${relative(process.cwd(), file)} overrides.${name}=${version}`);
                  changed = true;
                }
              }
            }

            for (const section of dependencySections) {
              const dependencies = packageJson[section];
              if (!dependencies) continue;

              for (const [name, version] of Object.entries(pins)) {
                if (dependencies[name] && dependencies[name] !== version) {
                  dependencies[name] = version;
                  changes.push(`${relative(process.cwd(), file)} ${section}.${name}=${version}`);
                  changed = true;
                }
              }
            }

            if (changed) writeFileSync(file, `${JSON.stringify(packageJson, null, "\t")}\n`);
          }

          if (changes.length === 0) {
            console.log("Mastra dependency pins already applied.");
          } else {
            console.log(`Applied Mastra dependency pins:\n${changes.join("\n")}`);
          }
          NODE

      - name: ARM64 arch fixup (deterministic, fail-fast)
        working-directory: superset
        shell: pwsh
        run: |
          # These three fixups are arch-critical and MUST be correct, so they are applied
          # deterministically here rather than relying on the non-deterministic AI patch step.
          # Each is validated locally on real Windows ARM64 hardware.
          $ErrorActionPreference = 'Stop'

          # (A) Route bare microsoft/node-pty (no win32-arm64 prebuilt; needs node-gyp) to the
          #     drop-in @lydell/node-pty fork which ships a win32-arm64 prebuilt. The desktop
          #     app already uses this alias (Patch 10); extend it to the two packages that
          #     still pin the bare package so the whole build is prebuilt-only.
          #     Idempotent: the non-deterministic "Apply Windows patches" AI
          #     step sometimes already extends Patch 10's @lydell alias to
          #     these packages — detect that and skip rather than aborting.
          $pkgs = @('packages/host-service/package.json', 'packages/pty-daemon/package.json')
          foreach ($p in $pkgs) {
            if (-not (Test-Path $p)) { Write-Error "Missing $p"; exit 1 }
            $c = Get-Content -Raw $p
            if ($c -match '"node-pty"\s*:\s*"npm:@lydell/node-pty') {
              Write-Host "(A) $p already aliased to @lydell/node-pty (AI patch step) — skip"
            } elseif ($c -match '"node-pty"\s*:\s*"1\.1\.0"') {
              $c = $c -replace '"node-pty"\s*:\s*"1\.1\.0"', '"node-pty": "npm:@lydell/node-pty@^1.0.1"'
              Set-Content -Path $p -Value $c -NoNewline
              Write-Host "(A) Aliased node-pty -> @lydell/node-pty in $p"
            } elseif ($c -notmatch '"node-pty"') {
              Write-Host "(A) $p has no node-pty dependency — skip (nothing to alias)"
            } else {
              Write-Error "$p has node-pty at an unexpected value (not 1.1.0, not the @lydell alias); upstream/patch structure changed — aborting."
              exit 1
            }
          }
          # Fail fast if neither package ended up with node-pty routed to @lydell.
          $aliasOk = $false
          foreach ($p in $pkgs) {
            if ((Get-Content -Raw $p) -match '"node-pty"\s*:\s*"npm:@lydell/node-pty') { $aliasOk = $true }
          }
          if (-not $aliasOk) { Write-Error "(A) no node-pty -> @lydell alias present in host-service/pty-daemon after fixup; aborting."; exit 1 }

          # (B) Upstream build-bundled-cli.ts has no win32/arm64 Bun compile target. Add it.
          $cli = 'apps/desktop/scripts/build-bundled-cli.ts'
          if (-not (Test-Path $cli)) { Write-Error "Missing $cli"; exit 1 }
          $c = Get-Content -Raw $cli
          if ($c -notmatch '"bun-windows-x64"') {
            Write-Error "$cli has no bun-windows-x64 target (upstream structure changed); aborting."
            exit 1
          }
          if ($c -notmatch '"bun-windows-arm64"') {
            $c = $c -replace '(\bx64:\s*"bun-windows-x64",)', "`$1`r`n`t`tarm64: `"bun-windows-arm64`","
            Set-Content -Path $cli -Value $c -NoNewline
            Write-Host "(B) Added arm64 -> bun-windows-arm64 target to $cli"
          }
          if ((Get-Content -Raw $cli) -notmatch '"bun-windows-arm64"') {
            Write-Error "(B) failed: $cli still has no bun-windows-arm64 target"; exit 1
          }

          # (C) Native pty binary must target ARM64. PATCHES.md Patch 12 (step 5,
          #     electron-builder.ts win: block) and Patch 14 (copy-native-modules.ts)
          #     are AI-applied and introduce the x64 @lydell/node-pty-win32-x64
          #     packaging; this step makes the result ARM64. It is SELF-SUFFICIENT:
          #     if the AI patch step flaked and the packaging is absent, it splices
          #     the arm64 form in deterministically from scripts/fixup-snippets/ so a
          #     single non-deterministic AI miss can't abort the whole build (Patch 14
          #     is fragile: its `NATIVE_MODULE_DEPS` anchor no longer exists upstream,
          #     and the AI applies it as varying shapes — see copy-native note below).
          #     Per file: x64 literal -> rewrite; arm64/variant already present -> ok;
          #     truly absent -> inject. Idempotent. Verifies no residual x64 ships (the
          #     old guard aborted only if NEITHER file had the literal — a partial AI
          #     miss could ship with node-pty unmaterialized; this closes that gap).
          $ebSnippet = Get-Content -Raw '../scripts/fixup-snippets/node-pty-arm64-electron-builder.snippet'
          $cnmSnippet = Get-Content -Raw '../scripts/fixup-snippets/node-pty-arm64-copy-native.snippet'
          if (-not $ebSnippet) { Write-Error "(C) missing electron-builder arm64 snippet"; exit 1 }
          if (-not $cnmSnippet) { Write-Error "(C) missing copy-native arm64 snippet"; exit 1 }

          # electron-builder.ts: node-pty packaging lives in the win: block.
          $eb = 'apps/desktop/electron-builder.ts'
          if (-not (Test-Path $eb)) { Write-Error "(C) expected file missing: $eb"; exit 1 }
          $c = Get-Content -Raw $eb
          if ($c -match 'node-pty-win32-x64') {
            Set-Content -Path $eb -Value ($c -replace 'node-pty-win32-x64','node-pty-win32-arm64') -NoNewline
            Write-Host "(C) electron-builder.ts: rewrote node-pty-win32-x64 -> arm64"
          } elseif ($c -match 'node-pty-win32-arm64') {
            Write-Host "(C) electron-builder.ts: node-pty-win32-arm64 already present (ok)"
          } else {
            # AI Patch 12 step 5 absent -> inject after the win: block artifactName
            # (uniquely contains ${pkg.version}; linux's artifactName uses ${version}).
            $m = [regex]::Match($c, '(?m)^[\t ]*artifactName:.*\$\{pkg\.version\}.*\r?\n')
            if (-not $m.Success) { Write-Error "(C) electron-builder.ts: node-pty packaging absent AND win artifactName anchor not found; cannot inject -- aborting."; exit 1 }
            Set-Content -Path $eb -Value ($c.Insert($m.Index + $m.Length, $ebSnippet)) -NoNewline
            Write-Host "(C) electron-builder.ts: AI patch absent -- injected arm64 node-pty packaging into win block"
          }

          # copy-native-modules.ts: materializes the @lydell platform binary.
          #     The AI's Patch 14 application VARIES run-to-run: canonical (literal
          #     node-pty-win32-x64) OR an elaborated variant — a copyNodePtyPlatformBinary
          #     helper + a module-level, process.arch-based OPTIONAL_PLATFORM_MODULES
          #     with NO literal. Absence of the literal does NOT mean Patch 14 is
          #     absent. Inject ONLY on a total flake (no literal AND no variant marker):
          #     injecting a second `const OPTIONAL_PLATFORM_MODULES` shadows the AI's at
          #     function scope and crashes prepareNativeModules() with a TDZ
          #     "Cannot access 'OPTIONAL_PLATFORM_MODULES' before initialization"
          #     (this failed run 26372273783). When the variant is present we trust it —
          #     the runner is native win-arm64 so process.arch resolves arm64, the same
          #     trust 1.10.x builds already place in the AI's Patch 14.
          $cnm = 'apps/desktop/scripts/copy-native-modules.ts'
          if (-not (Test-Path $cnm)) { Write-Error "(C) expected file missing: $cnm"; exit 1 }
          $c = Get-Content -Raw $cnm
          if ($c -match 'node-pty-win32-x64') {
            Set-Content -Path $cnm -Value ($c -replace 'node-pty-win32-x64','node-pty-win32-arm64') -NoNewline
            Write-Host "(C) copy-native-modules.ts: rewrote node-pty-win32-x64 -> arm64"
          } elseif ($c -match 'node-pty-win32-arm64' -or $c -match 'OPTIONAL_PLATFORM_MODULES' -or $c -match 'copyNodePtyPlatformBinary') {
            Write-Host "(C) copy-native-modules.ts: node-pty platform materialization already present (ok)"
          } else {
            # Total AI flake -> inject the const + Bun-store copy loop before the
            # final console.log("\nDone!") inside prepareNativeModules() (in-scope vars).
            $m = [regex]::Match($c, '(?m)^[\t ]*console\.log\("\\nDone!"\);')
            if (-not $m.Success) { Write-Error "(C) copy-native-modules.ts: node-pty packaging absent AND Done! anchor not found; cannot inject -- aborting."; exit 1 }
            Set-Content -Path $cnm -Value ($c.Insert($m.Index, $cnmSnippet)) -NoNewline
            Write-Host "(C) copy-native-modules.ts: AI patch absent -- injected arm64 node-pty materialization"
          }

          # Verify no residual hardcoded x64 in either file. electron-builder must
          # also carry the arm64 literal (its asarUnpack/files globs are always
          # literal paths). copy-native-modules.ts may legitimately have no literal
          # (the AI's process.arch variant computes the name), so only assert there
          # that nothing is hardcoded to x64.
          foreach ($f in @($eb, $cnm)) {
            if ((Get-Content -Raw $f) -match 'node-pty-win32-x64') { Write-Error "(C) residual node-pty-win32-x64 in $f after fixup"; exit 1 }
          }
          if ((Get-Content -Raw $eb) -notmatch 'node-pty-win32-arm64') { Write-Error "(C) electron-builder.ts has no node-pty-win32-arm64 reference after fixup"; exit 1 }
          Write-Host "(C) node-pty win32 packaging is ARM64 (electron-builder.ts literal; copy-native-modules.ts arm64/variant)"

          # (D) validate-native-runtime.ts hardcodes the win32 platform packages
          #     to x64. Make the libsql + ast-grep candidates arch-aware so the
          #     build-time guard accepts the arm64 variants we supply.
          $vnr = 'apps/desktop/scripts/validate-native-runtime.ts'
          if (-not (Test-Path $vnr)) { Write-Error "Missing $vnr"; exit 1 }
          $c = Get-Content -Raw $vnr
          if ($c -notmatch '\["@libsql/win32-x64-msvc"\]' -or $c -notmatch '\["@ast-grep/napi-win32-x64-msvc"\]') {
            Write-Error "$vnr win32 candidate lists changed upstream; aborting."; exit 1
          }
          $c = $c -replace '\["@libsql/win32-x64-msvc"\]', '[targetArch === "arm64" ? "@libsql/win32-arm64-msvc" : "@libsql/win32-x64-msvc"]'
          $c = $c -replace '\["@ast-grep/napi-win32-x64-msvc"\]', '[targetArch === "arm64" ? "@ast-grep/napi-win32-arm64-msvc" : "@ast-grep/napi-win32-x64-msvc"]'
          Set-Content -Path $vnr -Value $c -NoNewline
          if ((Get-Content -Raw $vnr) -notmatch 'win32-arm64-msvc') { Write-Error "(D) validate-native-runtime arm64 patch failed"; exit 1 }
          Write-Host "(D) validate-native-runtime.ts win32 candidates made arch-aware"

          # (E) electron-builder.ts win target hardcodes arch ["x64"]; build ARM64 only.
          $eb = 'apps/desktop/electron-builder.ts'
          $c = Get-Content -Raw $eb
          if ($c -match 'arch:\s*\[\s*"x64"\s*\]') {
            $c = $c -replace 'arch:\s*\[\s*"x64"\s*\]', 'arch: ["arm64"]'
            Set-Content -Path $eb -Value $c -NoNewline
            Write-Host "(E) electron-builder.ts win target arch -> arm64"
          } else {
            Write-Host "(E) no hardcoded win arch [x64] found (ok if upstream changed; --arm64 CLI still applies)"
          }

          # (G) NSIS: ship a single one-click installer. Upstream is the
          #     assisted wizard (oneClick:false). allowToChangeInstallationDirectory
          #     is assisted-only (ignored when oneClick:true) — set false to match.
          $c = Get-Content -Raw $eb
          if ($c -notmatch 'oneClick:\s*false') {
            Write-Error "(G) electron-builder.ts nsis.oneClick:false not found; upstream NSIS config changed — aborting (goal requires a one-click binary)."
            exit 1
          }
          $c = $c -replace 'oneClick:\s*false', 'oneClick: true'
          $c = $c -replace 'allowToChangeInstallationDirectory:\s*true', 'allowToChangeInstallationDirectory: false'
          Set-Content -Path $eb -Value $c -NoNewline
          if ((Get-Content -Raw $eb) -notmatch 'oneClick:\s*true') { Write-Error "(G) oneClick patch failed"; exit 1 }
          Write-Host "(G) electron-builder.ts NSIS -> oneClick: true (single one-click binary)"

          # (H) Windows titlebar: upstream is frameless + macOS-centric
          #     (frame:false, trafficLightPosition) so Windows has no visible
          #     window controls. On win32 use titleBarStyle:hidden + a native
          #     titleBarOverlay (visible min/max/close); keep mac unchanged.
          #     NOTE: frame:false suppresses the Windows overlay, so the win32
          #     branch must NOT set frame:false.
          $mw = 'apps/desktop/src/main/windows/main.ts'
          if (-not (Test-Path $mw)) { Write-Error "Missing $mw"; exit 1 }
          $c = Get-Content -Raw $mw
          if ($c -notmatch 'frame: false,\s*titleBarStyle: "hidden",\s*trafficLightPosition: \{ x: 16, y: 16 \},') {
            Write-Error "(H) expected frameless/trafficLight window block not found in $mw; upstream window config changed — aborting."
            exit 1
          }
          $repl = '...(process.platform === "win32" ? { titleBarStyle: "hidden" as const, titleBarOverlay: { color: "#1f1f1f", symbolColor: "#e6e6e6", height: 36 } } : { frame: false, titleBarStyle: "hidden" as const, trafficLightPosition: { x: 16, y: 16 } }),'
          $c = $c -replace 'frame: false,\s*titleBarStyle: "hidden",\s*trafficLightPosition: \{ x: 16, y: 16 \},', $repl
          Set-Content -Path $mw -Value $c -NoNewline
          if ((Get-Content -Raw $mw) -notmatch 'titleBarOverlay') { Write-Error "(H) titleBarOverlay patch failed"; exit 1 }
          Write-Host "(H) main.ts -> Windows titleBarOverlay (visible native window controls)"

          # (AM) startup-timing: log cold-start ms (process start -> renderer
          #      did-finish-load) via electron-log (log.info) so it reaches
          #      main.log; raw console.* may only hit the terminal transport
          #      (auto-updater.ts notes "use log.* not console.*" for the file).
          #      Anchored on the stable upstream boot log; literal .Replace +
          #      string concat (no regex/$ or template-literal traps).
          $c = Get-Content -Raw $mw
          $amAnchor = 'console.log("[main-window] Renderer loaded successfully");'
          $amLine = 'log.info("[startup] cold start: " + Math.round(process.uptime() * 1000) + "ms (process start -> did-finish-load)");'
          if ($c.Contains('[startup] cold start')) {
            Write-Host "(AM) startup-timing already present -- skip"
          } elseif (-not $c.Contains($amAnchor)) {
            Write-Error "(AM) boot-log anchor not found in $mw; upstream changed -- re-anchor (AM)"; exit 1
          } else {
            $c = $c.Replace($amAnchor, $amAnchor + "`r`n`t`t" + $amLine)
            Set-Content -Path $mw -Value $c -NoNewline
            Write-Host "(AM) main.ts -> cold-start timing log added after renderer did-finish-load"
          }
          if (-not ((Get-Content -Raw $mw).Contains('[startup] cold start'))) { Write-Error "(AM) startup-timing verify failed"; exit 1 }
          Write-Host "(AM) startup-timing verified"

          # (I) Force-package @anush008/tokenizers-win32-arm64-msvc outside the
          #     asar. @anush008/tokenizers (transitive via fastembed) bare-
          #     requires its win-arm64 platform pkg, but @anush008/tokenizers
          #     @0.0.0 does NOT declare it in optionalDependencies, so the
          #     electron-builder collector never packages it — and
          #     copy:native-modules has no tokenizers handling (unlike libsql).
          #     An extraResources entry copies it to
          #     <app>/resources/node_modules/@anush008/tokenizers-win32-arm64-msvc;
          #     @anush008/tokenizers's runtime require() then resolves it via
          #     Node's asar -> resources/node_modules fall-through (verified on
          #     real ARM64 hardware). materialize stages the dir at
          #     apps/desktop/node_modules/@anush008/tokenizers-win32-arm64-msvc.
          $c = Get-Content -Raw $eb
          if ($c -notmatch 'extraResources:\s*\[') {
            Write-Error "(I) electron-builder.ts has no extraResources array; upstream changed — aborting."
            exit 1
          }
          if ($c -notmatch 'tokenizers-win32-arm64-msvc') {
            $tokEntry = "extraResources: [`r`n`t`t`t{`r`n`t`t`t`tfrom: `"node_modules/@anush008/tokenizers-win32-arm64-msvc`",`r`n`t`t`t`tto: `"node_modules/@anush008/tokenizers-win32-arm64-msvc`",`r`n`t`t`t`tfilter: [`"**/*`"],`r`n`t`t`t},"
            $c = $c -replace 'extraResources:\s*\[', $tokEntry
            Set-Content -Path $eb -Value $c -NoNewline
          }
          if ((Get-Content -Raw $eb) -notmatch 'tokenizers-win32-arm64-msvc') { Write-Error "(I) extraResources patch failed"; exit 1 }
          Write-Host "(I) electron-builder.ts extraResources += @anush008/tokenizers-win32-arm64-msvc"

          # (J) Terminal "Daemon unavailable" fix. host-service's DaemonSupervisor
          #     spawns the V2 pty-daemon via process.execPath (the Electron
          #     binary) but omits ELECTRON_RUN_AS_NODE — and host-service.js's
          #     electron-vite banner has already deleted that var from its own
          #     process.env, so the spread {...process.env} can't carry it. The
          #     daemon child then boots the full Electron GUI app instead of
          #     pty-daemon.js and never binds its named pipe. Re-assert the var
          #     in childEnv (harmless under plain Node; matches the v1
          #     terminal-host spawn). Diagnosed + proven on real ARM64 hardware.
          $ds = 'packages/host-service/src/daemon/DaemonSupervisor.ts'
          if (-not (Test-Path $ds)) { Write-Error "(J) missing $ds"; exit 1 }
          $c = Get-Content -Raw $ds
          if ($c -match 'ELECTRON_RUN_AS_NODE') {
            Write-Host "(J) DaemonSupervisor already sets ELECTRON_RUN_AS_NODE — skip"
          } elseif ($c -match 'SUPERSET_PTY_DAEMON_VERSION: EXPECTED_DAEMON_VERSION,') {
            $c = $c -replace '(SUPERSET_PTY_DAEMON_VERSION: EXPECTED_DAEMON_VERSION,)', "`$1`r`n`t`t`tELECTRON_RUN_AS_NODE: `"1`","
            Set-Content -Path $ds -Value $c -NoNewline
          } else {
            Write-Error "(J) childEnv anchor not found in $ds; upstream changed — aborting (terminal daemon would break)."
            exit 1
          }
          if ((Get-Content -Raw $ds) -notmatch 'ELECTRON_RUN_AS_NODE') { Write-Error "(J) DaemonSupervisor patch failed"; exit 1 }
          Write-Host "(J) DaemonSupervisor.ts childEnv += ELECTRON_RUN_AS_NODE=1 (pty-daemon runs as Node)"

          # (K) Agents "Couldn't load agent settings: Failed to fetch" fix. The
          #     packaged renderer loads from the superset-app:// custom protocol;
          #     its Origin (superset-app://app) is not in host-service's CORS
          #     allowedOrigins (only the dev Vite ports), so every renderer
          #     fetch to host-service /trpc is blocked at the CORS preflight.
          #     Add the packaged origin. Diagnosed + proven on real ARM64 hardware.
          $hs = 'apps/desktop/src/main/host-service/index.ts'
          if (-not (Test-Path $hs)) { Write-Error "(K) missing $hs"; exit 1 }
          $c = Get-Content -Raw $hs
          if ($c -match 'superset-app://app') {
            Write-Host "(K) host-service allowedOrigins already includes superset-app://app — skip"
          } elseif ($c -match 'allowedOrigins: \[') {
            $c = $c -replace '(allowedOrigins: \[)', "`$1`r`n`t`t`t`t`"superset-app://app`","
            Set-Content -Path $hs -Value $c -NoNewline
          } else {
            Write-Error "(K) allowedOrigins anchor not found in $hs; upstream changed — aborting (agent settings fetch would break)."
            exit 1
          }
          if ((Get-Content -Raw $hs) -notmatch 'superset-app://app') { Write-Error "(K) host-service CORS patch failed"; exit 1 }
          Write-Host "(K) host-service/index.ts allowedOrigins += superset-app://app (renderer CORS)"

          # (AE) Non-git workspaces — the BULK of the feature as a git-apply patch:
          #      host-service create path (kind:"nonGitFolder" + probePath +
          #      non-strict main workspace using the inert NON_GIT_BRANCH marker),
          #      server-side isGitRepo guards (git.ts assertGitRepo + read empties,
          #      pull-requests, workspace-creation procedures), git-watcher fs-watch
          #      for non-git folders + Windows path fix, renderer git-gating
          #      (Changes/Review/PR/branch/diff hidden when non-git), the non-git
          #      badge PROP RECEIVERS (Icon/Collapsed/ContextMenu), and the new
          #      runtime/git/non-git.ts + useIsGitRepo hook. Applied BEFORE (L) so
          #      (L)'s git-watcher hunks layer on top of this patch's git-watcher
          #      reorder (verified coexisting). EXCLUDES workspaces.ts (PATCHES.md
          #      Patch 28 overlap -> (AF) inline) and the 2 patch-P badge files
          #      Item/ExpandedRow (-> (AG) inline). Idempotent + fail-fast.
          $ng = '../patches/nongit-workspaces.patch'
          if (-not (Test-Path $ng)) { Write-Error "(AE) missing $ng in patches repo"; exit 1 }
          if (Test-Path 'packages/host-service/src/runtime/git/non-git.ts') {
            Write-Host "(AE) non-git-workspaces already present — skip"
          } else {
            $aeErr = "$env:RUNNER_TEMP/ae-apply-check.txt"
            git apply --check $ng 2>$aeErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(AE) nongit-workspaces.patch does not apply cleanly. git apply --check output:"
              if (Test-Path $aeErr) { Get-Content $aeErr | ForEach-Object { Write-Host "    (AE-check) $_" } }
              Write-Error "(AE) nongit-workspaces.patch failed to apply — host-service/renderer shape changed upstream. Regenerate it (author flow: implement in a clone, git diff excluding workspaces.ts + the 2 badge files). ABORTING rather than ship a partial non-git feature."
              exit 1
            }
            git apply $ng
            if ($LASTEXITCODE -ne 0) { Write-Error "(AE) git apply failed after a clean --check"; exit 1 }
          }
          if (-not (Test-Path 'packages/host-service/src/runtime/git/non-git.ts')) { Write-Error "(AE) non-git.ts missing after apply"; exit 1 }
          if (-not (Test-Path 'apps/desktop/src/renderer/hooks/host-service/useIsGitRepo/useIsGitRepo.ts')) { Write-Error "(AE) useIsGitRepo hook missing after apply"; exit 1 }
          if ((Get-Content -Raw 'packages/host-service/src/trpc/router/project/project.ts') -notmatch 'nonGitFolder') { Write-Error "(AE) nonGitFolder create mode missing after apply"; exit 1 }
          if ((Get-Content -Raw 'packages/host-service/src/trpc/router/git/git.ts') -notmatch 'assertGitRepo') { Write-Error "(AE) git.ts isGitRepo guards missing after apply"; exit 1 }
          Write-Host "(AE) non-git-workspaces applied (create path + server-side git guards + renderer gating + badge receivers)"

          # (AF) workspaces.create non-git guard — workspaces.ts is ALSO edited by
          #      PATCHES.md Patch 28, so splice the guard INLINE (anchor-based)
          #      instead of via (AE)'s git-apply, to avoid a patch-vs-patch
          #      collision. Adds the isGitRepo import + a guard after the FIRST
          #      `const localProject = requireLocalProject(ctx, input.projectId);`
          #      (the create mutation; a later occurrence belongs to another
          #      procedure). Splices the TS from scripts/fixup-snippets/.
          #      Idempotent + fail-fast.
          $wsf = 'packages/host-service/src/trpc/router/workspaces/workspaces.ts'
          if (-not (Test-Path $wsf)) { Write-Error "(AF) missing $wsf"; exit 1 }
          $wsfAbs = (Resolve-Path $wsf).Path
          $wsc = [System.IO.File]::ReadAllText($wsfAbs)
          if ($wsc -match 'Cannot create a branch/worktree in a non-git workspace') {
            Write-Host "(AF) workspaces.create non-git guard already present — skip"
          } else {
            $afSnippet = Get-Content -Raw '../scripts/fixup-snippets/nongit-create-guard.snippet'
            if (-not $afSnippet) { Write-Error "(AF) missing scripts/fixup-snippets/nongit-create-guard.snippet"; exit 1 }
            if ($wsc -notmatch 'runtime/git/non-git') {
              $imp = 'import { workspaces } from "../../../db/schema";'
              $impIdx = $wsc.IndexOf($imp)
              if ($impIdx -lt 0) { Write-Error "(AF) db/schema import anchor not found in workspaces.ts — re-anchor (AF)"; exit 1 }
              $impEnd = $wsc.IndexOf("`n", $impIdx)
              $wsc = $wsc.Insert($impEnd + 1, 'import { isGitRepo } from "../../../runtime/git/non-git";' + "`n")
            }
            $anchor = 'const localProject = requireLocalProject(ctx, input.projectId);'
            $aIdx = $wsc.IndexOf($anchor)
            if ($aIdx -lt 0) { Write-Error "(AF) requireLocalProject anchor not found in workspaces.ts — Patch 28 / upstream shape changed; re-anchor (AF) rather than ship the create factory unguarded for non-git."; exit 1 }
            $aEnd = $wsc.IndexOf("`n", $aIdx)
            $wsc = $wsc.Insert($aEnd + 1, "`n" + $afSnippet)
            [System.IO.File]::WriteAllText($wsfAbs, $wsc, (New-Object System.Text.UTF8Encoding $false))
          }
          $wsv = [System.IO.File]::ReadAllText($wsfAbs)
          if ($wsv -notmatch 'Cannot create a branch/worktree in a non-git workspace') { Write-Error "(AF) workspaces.create non-git guard missing after splice"; exit 1 }
          if ($wsv -notmatch 'runtime/git/non-git') { Write-Error "(AF) isGitRepo import missing in workspaces.ts after splice"; exit 1 }
          Write-Host "(AF) workspaces.create non-git guard spliced (rejects worktree creation in a non-git project)"

          # (L) Git-status spawn-storm fix (host-service). An unfiltered
          #     recursive fs.watch on .git/ turns every `git status` into a
          #     fresh git:changed event — git's own fsmonitor-cookie / lock
          #     writes inside .git/ re-trigger the watcher, a self-sustaining
          #     ~25 git.exe/sec storm that saturates host-service's single
          #     Node event loop on Windows (sluggish UI, terminal-keystroke
          #     lag, host-service killed -> "Failed to fetch"/"Failed to run
          #     preset"). Fix: filter git's internal churn out of the .git/
          #     watch (the loop-breaker) + memoize getRemoteUrl (was spawned
          #     on every ctx.git()). Diagnosed, Codex-reviewed, and MEASURED
          #     on real ARM64 hardware: ~25/sec -> ~0.1/sec idle. Shipped as a
          #     git patch (multi-line block inserts; anchor-regex would be
          #     brittle). Idempotent + fail-fast.
          $gp = '../patches/git-storm-fix.patch'
          if (-not (Test-Path $gp)) { Write-Error "(L) missing $gp in patches repo"; exit 1 }
          $gw = 'packages/host-service/src/events/git-watcher.ts'
          $grt = 'packages/host-service/src/runtime/git/git.ts'
          if (-not (Test-Path $gw)) { Write-Error "(L) missing $gw"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'isIgnoredGitDirChange' $gw) {
            Write-Host "(L) git-storm fix already present — skip"
          } else {
            git apply --check $gp 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Error "(L) git-storm-fix.patch does not apply cleanly — git-watcher.ts/git.ts changed upstream; aborting rather than shipping the ~25 git/sec storm. Regenerate patches/git-storm-fix.patch against the new upstream."
              exit 1
            }
            git apply $gp
            if ($LASTEXITCODE -ne 0) { Write-Error "(L) git apply failed"; exit 1 }
          }
          if ((Get-Content -Raw $gw) -notmatch 'isIgnoredGitDirChange') { Write-Error "(L) git-watcher .git/ filter missing after apply"; exit 1 }
          if ((Get-Content -Raw $grt) -notmatch 'getRemoteUrlCached') { Write-Error "(L) getRemoteUrl cache missing after apply"; exit 1 }
          Write-Host "(L) git-storm fix applied (git-watcher .git/ noise filter + getRemoteUrl cache)"

          # (M) Skip quit-confirmation dialog on Windows. Patch 19 (PATCHES.md)
          #     moves the quit-confirmation dialog into window.on("close") so it
          #     appears BEFORE the window closes. The dialog is a Win32 #32770
          #     parented to the main window — small, easy to miss if the user
          #     alt-tabs away after clicking X. If the user doesn't see/click
          #     the dialog, event.preventDefault() keeps Electron main alive
          #     indefinitely awaiting the dialog response. The dangling main
          #     process holds the single-instance lock; the next launch hits
          #     `gotTheLock === false` and calls app.exit(0) silently —
          #     "clicked Superset, nothing opens". Symptom: ~6-9 leftover
          #     Superset.exe processes (1 stuck Electron + helpers + released
          #     host-services from prior sessions). Reproduced live: closing
          #     the window with CloseMainWindow() left PID alive 30s+ with a
          #     visible "Quit Superset" dialog at hWnd 48169566; sending Enter
          #     to the dialog → app exited cleanly. Fix: remove Patch 19's
          #     dialog block in window.on("close"). Close→destroy→quit, no
          #     prompt. Patch 19's before-quit !PLATFORM.IS_WINDOWS gate stays,
          #     so neither path shows a dialog on Windows. Idempotent +
          #     fail-fast.
          # Implementation: the AI's Patch 19 close-handler output is NON-
          # deterministic — sometimes the full showMessageBox dialog, sometimes
          # just `if (PLATFORM.IS_WINDOWS) { event.preventDefault(); ... }` with
          # NO dialog (which still hangs the close on the await chain). The old
          # dialog-comment-anchored removal missed the no-dialog variant and
          # HARD-FAILED build 26420178793 at the verify gate. So we remove the
          # WHOLE `if (PLATFORM.IS_WINDOWS) { ... }` block from inside
          # window.on("close") by BRACE MATCHING (handles nested braces, any
          # reformatting, dialog or no-dialog) — exactly what PATCHES.md
          # prescribes: "remove Patch 19's if (PLATFORM.IS_WINDOWS) { … } block
          # from window.on('close')". Deterministic, idempotent (skips when no
          # such block remains), fail-fast (verify the close body has no
          # preventDefault / showMessageBox / IS_WINDOWS left). UTF-8 no-BOM
          # round-trip so non-ASCII elsewhere in main.ts is preserved.
          function Find-MatchEnd([string]$s, [int]$fromOpenBrace) {
            $depth = 0
            for ($bi = $fromOpenBrace; $bi -lt $s.Length; $bi++) {
              $bc = $s[$bi]
              if ($bc -eq [char]123) { $depth++ }
              elseif ($bc -eq [char]125) { $depth--; if ($depth -eq 0) { return $bi } }
            }
            return -1
          }
          function Get-CloseBody([string]$s) {
            $cm = [regex]::Match($s, 'window\.on\(\s*"close"\s*,\s*(?:async\s*)?\([^)]*\)\s*=>\s*\{')
            if (-not $cm.Success) { return $null }
            $ob = $s.IndexOf([char]123, $cm.Index + $cm.Length - 1)
            $en = Find-MatchEnd $s $ob
            if ($en -lt 0) { return $null }
            return [pscustomobject]@{ Start = $ob + 1; End = $en }
          }
          $mw = 'apps/desktop/src/main/windows/main.ts'
          if (-not (Test-Path $mw)) { Write-Error "(M) missing $mw"; exit 1 }
          $mwAbs = (Resolve-Path $mw).Path
          $mwBody = [System.IO.File]::ReadAllText($mwAbs)
          $cb = Get-CloseBody $mwBody
          if ($null -eq $cb) {
            Write-Host "(M) no window.on('close') handler found — Patch 19 close-move absent this run; skip"
          } else {
            $closeBody = $mwBody.Substring($cb.Start, $cb.End - $cb.Start)
            $ifM = [regex]::Match($closeBody, 'if\s*\(\s*PLATFORM\.IS_WINDOWS\s*\)\s*\{')
            if (-not $ifM.Success) {
              Write-Host "(M) no if (PLATFORM.IS_WINDOWS) block inside window.on('close') — already clean / quit-confirmation not inserted; skip"
            } else {
              $ifOb = $closeBody.IndexOf([char]123, $ifM.Index + $ifM.Length - 1)
              $ifEnd = Find-MatchEnd $closeBody $ifOb
              if ($ifEnd -lt 0) { Write-Error "(M) could not brace-match the if (PLATFORM.IS_WINDOWS) block in window.on('close')"; exit 1 }
              $newClose = $closeBody.Remove($ifM.Index, $ifEnd - $ifM.Index + 1)
              $newMw = $mwBody.Substring(0, $cb.Start) + $newClose + $mwBody.Substring($cb.End)
              [System.IO.File]::WriteAllText($mwAbs, $newMw, (New-Object System.Text.UTF8Encoding $false))
              Write-Host "(M) removed if (PLATFORM.IS_WINDOWS) quit-confirmation block from window.on('close') (brace-matched, AI-variant-agnostic)"
            }
          }
          # verify: the close-handler body must have no quit-confirmation / hang risk left
          $verify = [System.IO.File]::ReadAllText($mwAbs)
          $vcb = Get-CloseBody $verify
          if ($null -ne $vcb) {
            $vBody = $verify.Substring($vcb.Start, $vcb.End - $vcb.Start)
            if ($vBody -match 'dialog\.showMessageBox') { Write-Error "(M) dialog.showMessageBox still inside window.on('close') after removal — lock-hang risk remains"; exit 1 }
            if ($vBody -match 'preventDefault') { Write-Error "(M) preventDefault still inside window.on('close') after removal — close-hang risk remains"; exit 1 }
            if ($vBody -match 'PLATFORM\.IS_WINDOWS') { Write-Error "(M) PLATFORM.IS_WINDOWS still inside window.on('close') after removal"; exit 1 }
          }
          Write-Host "(M) skip-quit-confirmation applied (no quit dialog / preventDefault in window.on('close') on Windows)"

          # (M2) before-quit Windows gate — companion to (M). PATCHES.md Patch 19
          #      part 2 told the AI to add !PLATFORM.IS_WINDOWS to a
          #      `const shouldConfirm = !skipConfirmation && ...` that DOES NOT
          #      EXIST in upstream 1.12.1 (real code is an inline
          #      `if (!skipQuitConfirmation && !isDev && getConfirmOnQuitSetting()) {`
          #      in index.ts before-quit). So the gate was never applied and the
          #      quit-confirmation dialog still fired on Windows close
          #      (window-all-closed -> app.quit() -> before-quit). The (M) step
          #      only removes the window.on("close") dialog, never this one.
          #      Deterministic .Replace on the real anchor; PLATFORM is already
          #      imported in index.ts. Idempotent + hard-abort on drift.
          $ix = 'apps/desktop/src/main/index.ts'
          if (-not (Test-Path $ix)) { Write-Error "(M2) missing $ix"; exit 1 }
          $c = Get-Content -Raw $ix
          $m2Anchor = 'if (!skipQuitConfirmation && !isDev && getConfirmOnQuitSetting()) {'
          $m2Done   = 'if (!PLATFORM.IS_WINDOWS && !skipQuitConfirmation && !isDev && getConfirmOnQuitSetting()) {'
          if ($c.Contains($m2Done)) {
            Write-Host "(M2) before-quit Windows gate already present — skip"
          } elseif (-not $c.Contains($m2Anchor)) {
            Write-Error "(M2) before-quit anchor not found in $ix; upstream changed -- re-anchor (M2)"; exit 1
          } else {
            if (-not ($c -match 'PLATFORM')) { Write-Error "(M2) PLATFORM not imported in $ix -- cannot gate before-quit"; exit 1 }
            $c = $c.Replace($m2Anchor, $m2Done)
            Set-Content -Path $ix -Value $c -NoNewline
            Write-Host "(M2) before-quit gated with !PLATFORM.IS_WINDOWS (no quit dialog on Windows)"
          }
          if (-not ((Get-Content -Raw $ix).Contains($m2Done))) { Write-Error "(M2) before-quit gate verify failed"; exit 1 }

          # (AV) webgl render recovery — REPLACES retired [AI] Patch 20, whose
          #      anchor (createTerminalInstance / loadRenderer / rendererRef /
          #      clearTextureAtlas-on-a-local) no longer exists in 1.12.1. The
          #      real WebGL load is in renderer/lib/terminal/terminal-addons.ts
          #      loadAddons(), deferred to rAF: `terminal.loadAddon(webglAddon)`.
          #      xterm.open() instantiates the DOM renderer first; when WebGL
          #      swaps in on the next frame the first paint can be garbled /
          #      overlapping on Windows (the original Patch 20 bug) because the
          #      DOM glyph atlas is stale. Splice the same recovery tab-switching
          #      does — clear the texture atlas + force a full refresh — right
          #      after the addon loads. clearTextureAtlas?.() + refresh are safe
          #      idempotent xterm ops (no-op if unneeded). Deterministic
          #      .Replace on the bare unique anchor; idempotent + hard-abort on
          #      drift. (Renderer behaviour change — verify terminal first-paint
          #      on the device after install.)
          $ta = 'apps/desktop/src/renderer/lib/terminal/terminal-addons.ts'
          if (-not (Test-Path $ta)) { Write-Error "(AV) missing $ta"; exit 1 }
          $c = Get-Content -Raw $ta
          $avAnchor = 'terminal.loadAddon(webglAddon);'
          $avAdd = "`r`n`t`t`twebglAddon.clearTextureAtlas?.();`r`n`t`t`tterminal.refresh(0, terminal.rows - 1);"
          if ($c.Contains('webglAddon.clearTextureAtlas?.()')) {
            Write-Host "(AV) webgl render recovery already present — skip"
          } elseif (-not $c.Contains($avAnchor)) {
            Write-Error "(AV) 'terminal.loadAddon(webglAddon);' anchor not found in $ta; upstream changed -- re-anchor (AV)"; exit 1
          } else {
            $c = $c.Replace($avAnchor, $avAnchor + $avAdd)
            Set-Content -Path $ta -Value $c -NoNewline
            Write-Host "(AV) webgl render recovery spliced after terminal.loadAddon(webglAddon)"
          }
          if (-not ((Get-Content -Raw $ta).Contains('webglAddon.clearTextureAtlas?.()'))) { Write-Error "(AV) webgl recovery verify failed"; exit 1 }

          # (AW) red-over-yellow precedence — a pending AskUserQuestion/permission
          #      (RED) must never be downgraded to working (YELLOW) by the
          #      background-subagent keep-alive. The System-1 watcher mirror
          #      (windows-notify-hook.patch) FORCE-asserts activity on the parent
          #      terminal while background subagents run, but it CANNOT observe the
          #      POST-hook-driven red (split-brain), so it used to emit "Start"
          #      (-> working) and stomp the red dot (user ignored a question because
          #      it showed yellow). The mirror now emits the distinct eventType
          #      "SubagentActive"; this fixup teaches the renderer's status-transition
          #      reducer to treat it as working ONLY when the source is not already
          #      "permission" (red wins). The legit answer-release stays "Start"
          #      (PostToolUse) and still clears red -> working. Deterministic
          #      .Replace before the Start case; idempotent + hard-abort on drift.
          $st = 'apps/desktop/src/renderer/routes/_authenticated/components/V2NotificationController/lib/statusTransitions.ts'
          if (-not (Test-Path $st)) { Write-Error "(AW) missing $st"; exit 1 }
          $c = Get-Content -Raw $st
          $stAnchor = 'if (payload.eventType === "Start") {'
          # Match the EXACT inserted branch (not a bare "SubagentActive" token) so a
          # stray occurrence upstream — in a type/comment/other branch — can never
          # false-positive the idempotency skip or the verify and silently drop the
          # red-over-yellow guard (deep review: 2x codex flagged the bare-substring check).
          $stMarker = 'if (payload.eventType === "SubagentActive") {'
          $stAdd = "if (payload.eventType === `"SubagentActive`") {`r`n`t`tconst subagentEntry = statuses[terminalSourceKey];`r`n`t`tif (subagentEntry?.workspaceId === workspaceId && subagentEntry.status === `"permission`") {`r`n`t`t`treturn { clearSources: [], setStatus: null };`r`n`t`t}`r`n`t`treturn { clearSources: [], setStatus: { source: terminalSource, status: `"working`" } };`r`n`t}`r`n`r`n`t"
          if ($c.Contains($stMarker)) {
            Write-Host "(AW) red-over-yellow (SubagentActive) already present — skip"
          } elseif (-not $c.Contains($stAnchor)) {
            Write-Error "(AW) statusTransitions Start anchor not found in $st; upstream changed -- re-anchor (AW)"; exit 1
          } else {
            # Fail loud if the Start anchor isn't unique: String.Replace is
            # all-occurrences, so a future upstream with 2+ Start cases would
            # inject the branch before each. Assert exactly one (deep review: claude).
            $anchorCount = ([regex]::Matches($c, [regex]::Escape($stAnchor))).Count
            if ($anchorCount -ne 1) { Write-Error "(AW) expected exactly 1 Start-case anchor in $st, found $anchorCount -- re-anchor (AW)"; exit 1 }
            $c = $c.Replace($stAnchor, $stAdd + $stAnchor)
            Set-Content -Path $st -Value $c -NoNewline
            Write-Host "(AW) statusTransitions: SubagentActive keep-alive yields to permission (red > yellow)"
          }
          if (-not ((Get-Content -Raw $st).Contains($stMarker))) { Write-Error "(AW) red-over-yellow verify failed"; exit 1 }

          # (N) Agent JSONL watcher (main process). Upstream's
          #     agent-wrappers-claude-codex-opencode.ts registers a bash-only
          #     hook command in ~/.claude/settings.json
          #     ([ -n "$SUPERSET_HOME_DIR" ] && [ -x ... ] && notify.sh || true).
          #     On Windows Claude executes that via Git Bash, where /usr/bin/[
          #     errors and `|| true` swallows the failure — exitCode:0 is
          #     recorded in the JSONL but no AGENT_LIFECYCLE event ever reaches
          #     the renderer, so the green "review"/amber "working"/red
          #     "permission" status indicators on workspace icons never light up.
          #     Full chain (settings.json hooks, notify.sh, Express notification
          #     server on 51741, ~/.superset/bin/claude wrapper) is broken
          #     across four independent layers on Windows. Fix: add a Node
          #     fs.watch on ~/.claude/projects/**/*.jsonl that tails session
          #     transcripts, derives Start/Stop lifecycle events from entry
          #     types, resolves the owning pane via cwd-encoding match against
          #     appState.tabsState, and emits into the existing
          #     notificationsEmitter — sidestepping the bash chain entirely.
          #     Shipped as a git patch (new file + main.ts wiring). Idempotent
          #     + fail-fast.
          $jw = '../patches/agent-jsonl-watcher.patch'
          if (-not (Test-Path $jw)) { Write-Error "(N) missing $jw in patches repo"; exit 1 }
          $mw = 'apps/desktop/src/main/windows/main.ts'
          $nt = 'apps/desktop/src/shared/notification-types.ts'
          $rnt = 'apps/desktop/src/renderer/stores/tabs/utils/resolve-notification-target.ts'
          if (-not (Test-Path $mw)) { Write-Error "(N) missing $mw"; exit 1 }
          if (-not (Test-Path $nt)) { Write-Error "(N) missing $nt"; exit 1 }
          if (-not (Test-Path $rnt)) { Write-Error "(N) missing $rnt"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'startAgentJsonlWatcher' $mw) {
            Write-Host "(N) agent-jsonl-watcher fix already present — skip"
          } else {
            git apply --check $jw 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Error "(N) agent-jsonl-watcher.patch does not apply cleanly — one of main.ts / shared/notification-types.ts / resolve-notification-target.ts changed upstream; aborting rather than shipping with the green-badge indicator broken. Regenerate patches/agent-jsonl-watcher.patch against the new upstream."
              exit 1
            }
            git apply $jw
            if ($LASTEXITCODE -ne 0) { Write-Error "(N) git apply failed"; exit 1 }
          }
          if (-not (Test-Path 'apps/desktop/src/main/lib/agent-jsonl-watcher/agent-jsonl-watcher.ts')) { Write-Error "(N) watcher source file missing after apply"; exit 1 }
          if (-not (Test-Path 'apps/desktop/src/main/lib/agent-jsonl-watcher/pane-map-hook.ts')) { Write-Error "(N) pane-map-hook source file missing after apply"; exit 1 }
          if ((Get-Content -Raw $mw) -notmatch 'startAgentJsonlWatcher') { Write-Error "(N) startAgentJsonlWatcher wiring missing in main.ts after apply"; exit 1 }
          if ((Get-Content -Raw $mw) -notmatch 'stopAgentJsonlWatcher') { Write-Error "(N) stopAgentJsonlWatcher cleanup missing in main.ts after apply (watcher leak on window close)"; exit 1 }
          if ((Get-Content -Raw $nt) -notmatch 'cwd\?: string') { Write-Error "(N) NotificationIds.cwd field missing after apply"; exit 1 }
          if ((Get-Content -Raw $rnt) -notmatch 'paneIdFromCwd') { Write-Error "(N) cwd-based pane resolution missing after apply"; exit 1 }
          $watcher = Get-Content -Raw 'apps/desktop/src/main/lib/agent-jsonl-watcher/agent-jsonl-watcher.ts'
          if ($watcher -notmatch 'CODEX_PARSER') { Write-Error "(N) Codex parser missing in watcher after apply"; exit 1 }
          if ($watcher -notmatch 'isPermissionRequest') { Write-Error "(N) PermissionRequest detection missing in watcher after apply"; exit 1 }
          if ($watcher -notmatch 'installPaneMapHook') { Write-Error "(N) pane-map-hook installation call missing in watcher after apply"; exit 1 }
          Write-Host "(N) agent-jsonl-watcher applied (Claude + Codex JSONL -> session-keyed dedup -> cwd+paneId mapping -> green/amber/red badges)"

          # (N-guard) Fail FAST if the embedded Python PANE_MAP_SCRIPT template
          #     literal contains an unescaped backtick or ${ — both terminate
          #     the JS template literal early and esbuild fails compile:app
          #     eight minutes later. Run this check the moment the patch
          #     lands so the failure points to the offending edit.
          $hookFile = 'apps/desktop/src/main/lib/agent-jsonl-watcher/pane-map-hook.ts'
          $hookSrc = Get-Content -Raw $hookFile
          $startIdx = $hookSrc.IndexOf('const PANE_MAP_SCRIPT = `')
          $endIdx = $hookSrc.IndexOf('`;', $startIdx + 25)
          if ($startIdx -lt 0 -or $endIdx -lt 0) { Write-Error "(N-guard) could not locate PANE_MAP_SCRIPT template bounds"; exit 1 }
          $body = $hookSrc.Substring($startIdx + 25, $endIdx - ($startIdx + 25))
          if ($body.Contains('`')) { Write-Error '(N-guard) PANE_MAP_SCRIPT template literal contains an unescaped backtick — esbuild will fail compile:app. Remove the backtick from the Python source.'; exit 1 }
          if ($body.Contains('${')) { Write-Error '(N-guard) PANE_MAP_SCRIPT template literal contains an unescaped dollar-brace — JS will try to interpolate it. Escape the dollar with a backslash, or remove.'; exit 1 }
          Write-Host "(N-guard) PANE_MAP_SCRIPT template literal is well-formed"

          # (O) RETIRED 2026-05-29 — was v1 per-terminal-dots (the legacy
          #     screens/main WorkspaceListItem.tsx sidebar row). The fork is now
          #     V2-ONLY (see (AD) v2-pin below), so that v1 row never renders.
          #     patches/per-terminal-dots.patch deleted; (P) provides the same
          #     per-terminal dots on the active v2 DashboardSidebar.
          #
          # (AD) v2-pin — the fork is V2-ONLY, FOREVER. Upstream gates the whole
          #      v2 UI on useIsV2CloudEnabled() = `v2Only || optInV2 === true`,
          #      where v2Only is account-age conditional (created >= 2026-05-15)
          #      and optInV2 is a persisted opt-in toggle. We force the hook to
          #      always return true so EVERY account renders v2 and every
          #      v2-targeted patch (P/Q/Z + the non-git-workspace feature) always
          #      applies — no v1 path to maintain. Deterministic regex edit on a
          #      stable, unique anchor (the hook body); also strips the now-unused
          #      store import so Biome (CI fails on warnings) stays clean.
          #      Idempotent + fail-fast.
          $v2h = 'apps/desktop/src/renderer/hooks/useIsV2CloudEnabled.ts'
          if (-not (Test-Path $v2h)) { Write-Error "(AD) missing $v2h — upstream layout changed; re-anchor the v2-pin rather than ship without it."; exit 1 }
          $v2hAbs = (Resolve-Path $v2h).Path
          $v2c = [System.IO.File]::ReadAllText($v2hAbs)
          if ($v2c -match '\(V2-PIN\)') {
            Write-Host "(AD) v2-pin already present — skip"
          } else {
            if ($v2c -notmatch '(?s)const v2Only = useIsV2OnlyUser\(\);.*?return v2Only \|\| optInV2 === true;') {
              Write-Error "(AD) useIsV2CloudEnabled body anchor not found in $v2h — upstream changed; re-anchor the v2-pin rather than ship without it (a missed pin would let a pre-cutoff account render the unpatched v1 UI)."
              exit 1
            }
            $v2c = $v2c -replace '(?s)const v2Only = useIsV2OnlyUser\(\);.*?return v2Only \|\| optInV2 === true;', "// (V2-PIN) Fork is v2-only, forever -- always report v2 active`n`t// regardless of account age or the opt-in toggle.`n`treturn true;"
            # Drop the now-unused store import (Biome treats unused imports as errors -> CI fails).
            $v2c = $v2c -replace '(?m)^import \{ useV2LocalOverrideStore \} from "renderer/stores/v2-local-override";\r?\n', ''
            [System.IO.File]::WriteAllText($v2hAbs, $v2c, (New-Object System.Text.UTF8Encoding $false))
            $v2v = [System.IO.File]::ReadAllText($v2hAbs)
            if ($v2v -notmatch '\(V2-PIN\)') { Write-Error "(AD) v2-pin marker missing after edit"; exit 1 }
            if ($v2v -match 'useV2LocalOverrideStore') { Write-Error "(AD) unused useV2LocalOverrideStore import still present after v2-pin (Biome will fail the build)"; exit 1 }
            Write-Host "(AD) v2-pin applied (useIsV2CloudEnabled always true; unused store import removed)"
          }

          # (P) Same per-terminal-dots treatment for the v2-workspace
          #     sidebar (DashboardSidebarExpandedWorkspaceRow). The v1
          #     WorkspaceSidebar/WorkspaceListItem.tsx that step (O)
          #     patches is from the legacy code path; v1.10.x defaults to
          #     v2-workspace which renders via DashboardSidebar instead.
          #     Adds a `terminalStatuses` prop fed from a new selector
          #     in the v2-notifications store. Idempotent + fail-fast.
          $vd = '../patches/v2-per-terminal-dots.patch'
          if (-not (Test-Path $vd)) { Write-Error "(P) missing $vd in patches repo"; exit 1 }
          $vstore = 'apps/desktop/src/renderer/stores/v2-notifications/store.ts'
          $vrow = 'apps/desktop/src/renderer/routes/_authenticated/_dashboard/components/DashboardSidebar/components/DashboardSidebarWorkspaceItem/components/DashboardSidebarExpandedWorkspaceRow/DashboardSidebarExpandedWorkspaceRow.tsx'
          if (-not (Test-Path $vstore)) { Write-Error "(P) missing $vstore"; exit 1 }
          if (-not (Test-Path $vrow)) { Write-Error "(P) missing $vrow"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'selectV2WorkspaceTerminalStatuses' $vstore) {
            Write-Host "(P) v2-per-terminal-dots already present — skip"
          } else {
            git apply --check $vd 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Error "(P) v2-per-terminal-dots.patch does not apply cleanly — DashboardSidebar or v2-notifications store changed upstream; aborting rather than shipping with v2 per-terminal indicator broken. Regenerate patches/v2-per-terminal-dots.patch."
              exit 1
            }
            git apply $vd
            if ($LASTEXITCODE -ne 0) { Write-Error "(P) git apply failed"; exit 1 }
          }
          if ((Get-Content -Raw $vstore) -notmatch 'selectV2WorkspaceTerminalStatuses') { Write-Error "(P) selectV2WorkspaceTerminalStatuses missing after apply"; exit 1 }
          if ((Get-Content -Raw $vrow) -notmatch 'terminalStatuses') { Write-Error "(P) terminalStatuses prop wiring missing after apply"; exit 1 }
          Write-Host "(P) v2-per-terminal-dots applied (v2 DashboardSidebar workspace rows render one StatusIndicator per active terminal)"

          # (AG) Non-git badge threading for the two patch-(P) files. Item.tsx and
          #      DashboardSidebarExpandedWorkspaceRow.tsx are edited by (P)
          #      (per-terminal dots), so splice the badge INLINE here, AFTER (P),
          #      by stable anchors — a git-apply diff would collide with (P).
          #      Item computes isNonGit via useIsGitRepo (skipped while pending) and
          #      threads it to the CollapsedButton / ExpandedRow / both context
          #      menus; ExpandedRow forwards it to its icon. The icon/menu PROP
          #      RECEIVERS already shipped in (AE). Verifies 4 + 2 prop-passes.
          #      Idempotent + fail-fast.
          $nl = "`n"
          $agItem = 'apps/desktop/src/renderer/routes/_authenticated/_dashboard/components/DashboardSidebar/components/DashboardSidebarWorkspaceItem/DashboardSidebarWorkspaceItem.tsx'
          $agEr = 'apps/desktop/src/renderer/routes/_authenticated/_dashboard/components/DashboardSidebar/components/DashboardSidebarWorkspaceItem/components/DashboardSidebarExpandedWorkspaceRow/DashboardSidebarExpandedWorkspaceRow.tsx'
          if (-not (Test-Path $agItem)) { Write-Error "(AG) missing $agItem — re-anchor (AG)"; exit 1 }
          if (-not (Test-Path $agEr)) { Write-Error "(AG) missing $agEr — re-anchor (AG)"; exit 1 }
          $agItemAbs = (Resolve-Path $agItem).Path
          $c = [System.IO.File]::ReadAllText($agItemAbs)
          if ($c -match 'isNonGit') {
            Write-Host "(AG) Item.tsx non-git badge already present — skip"
          } else {
            $c = [regex]::Replace($c, '(import \{ useDiffStats \} from "renderer/hooks/host-service/useDiffStats";)', ('$1' + $nl + 'import { useIsGitRepo } from "renderer/hooks/host-service/useIsGitRepo";'))
            $c = [regex]::Replace($c, '(\r?\n)([ \t]*)(const workspaceStatus = useV2WorkspaceNotificationStatus\(id\);)', ('$1$2$3$1$2' + '// (NON-GIT WORKSPACE) flag the icon once we positively know it is non-git.' + '$1$2' + 'const isNonGit = !useIsGitRepo(id, pendingTransaction?.type !== "insert");'))
            $c = [regex]::Replace($c, '(\r?\n)([ \t]*)(pullRequestState=\{pullRequest\?\.state \?\? null\})', '$1$2$3$1$2isNonGit={isNonGit}')
            $c = [regex]::Replace($c, '(terminalStatuses=\{terminalStatuses\}\r?\n)([ \t]*)(isInSection=\{isInSection\})', ('$1$2$3' + $nl + '$2isNonGit={isNonGit}'))
            $c = [regex]::Replace($c, '(isUnread=\{isUnread\}\r?\n)([ \t]*)(isLocalWorkspace=\{hostType === "local-device"\})', ('$1$2$3' + $nl + '$2isNonGit={isNonGit}'))
            $c = [regex]::Replace($c, '([ \t]*)(isLocalWorkspace=\{hostType === "local-device"\})(\r?\n[ \t]*isPinned=\{isMainWorkspace && hostType === "local-device"\}\r?\n[ \t]*onOpenInFinder=\{handleOpenInFinder\})', ('$1$2' + $nl + '$1isNonGit={isNonGit}$3'))
            [System.IO.File]::WriteAllText($agItemAbs, $c, (New-Object System.Text.UTF8Encoding $false))
          }
          $itemN = ([regex]::Matches([System.IO.File]::ReadAllText($agItemAbs), 'isNonGit=\{isNonGit\}')).Count
          if ($itemN -lt 4) { Write-Error "(AG) Item.tsx expected 4 isNonGit prop-passes, found $itemN — patch (P) shape changed; re-anchor (AG)"; exit 1 }
          if (([System.IO.File]::ReadAllText($agItemAbs)) -notmatch 'useIsGitRepo') { Write-Error "(AG) Item.tsx useIsGitRepo import/use missing after splice"; exit 1 }
          $agErAbs = (Resolve-Path $agEr).Path
          $c = [System.IO.File]::ReadAllText($agErAbs)
          if ($c -match 'isNonGit') {
            Write-Host "(AG) ExpandedRow.tsx non-git badge already present — skip"
          } else {
            $c = [regex]::Replace($c, '(\r?\n)([ \t]*)(isInSection\?: boolean;)', '$1$2$3$1$2isNonGit?: boolean;')
            $c = [regex]::Replace($c, '(\r?\n)([ \t]*)(isInSection = false,)', '$1$2$3$1$2isNonGit = false,')
            $c = [regex]::Replace($c, '(\r?\n)([ \t]*)(pullRequestState=\{pullRequest\.state\})', '$1$2$3$1$2isNonGit={isNonGit}')
            $c = [regex]::Replace($c, '(\r?\n)([ \t]*)(pullRequestState=\{null\})', '$1$2$3$1$2isNonGit={isNonGit}')
            [System.IO.File]::WriteAllText($agErAbs, $c, (New-Object System.Text.UTF8Encoding $false))
          }
          $erN = ([regex]::Matches([System.IO.File]::ReadAllText($agErAbs), 'isNonGit=\{isNonGit\}')).Count
          if ($erN -lt 2) { Write-Error "(AG) ExpandedRow.tsx expected 2 isNonGit prop-passes, found $erN — re-anchor (AG)"; exit 1 }
          Write-Host "(AG) non-git badge threaded into Item + ExpandedRow (after patch P)"

          # (Q) Per-tab mark-as-read on v2 workspace click.
          #     Upstream's handleClick on a workspace row calls
          #     clearWorkspaceAttention(workspaceId), which iterates every
          #     source in the store and deletes review-status entries for
          #     that workspace — clearing the dot on ALL terminals at once.
          #     With the per-terminal indicators we render in (P), that
          #     bulk-clear is wrong: opening a workspace shouldn't mark
          #     terminals the user hasn't actually visited as read. The
          #     existing useClearActivePaneAttention hook already clears
          #     just the active pane's source on focus; this patch drops
          #     the redundant bulk-clear so per-tab semantics survive.
          #     Idempotent + fail-fast.
          $vr = '../patches/v2-per-tab-read.patch'
          if (-not (Test-Path $vr)) { Write-Error "(Q) missing $vr in patches repo"; exit 1 }
          $actions = 'apps/desktop/src/renderer/routes/_authenticated/_dashboard/components/DashboardSidebar/components/DashboardSidebarWorkspaceItem/hooks/useDashboardSidebarWorkspaceItemActions/useDashboardSidebarWorkspaceItemActions.ts'
          if (-not (Test-Path $actions)) { Write-Error "(Q) missing $actions"; exit 1 }
          $actionsBody = Get-Content -Raw $actions
          $clickFn = if ($actionsBody -match '(?s)const handleClick = \(\) => \{(.+?)\};') { $matches[1] } else { '' }
          if (-not ($clickFn -match 'clearWorkspaceAttention\(workspaceId\)')) {
            Write-Host "(Q) handleClick bulk-clear already removed — skip"
          } else {
            git apply --check $vr 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Error "(Q) v2-per-tab-read.patch does not apply cleanly — useDashboardSidebarWorkspaceItemActions changed upstream; aborting rather than shipping with per-tab read broken. Regenerate patches/v2-per-tab-read.patch."
              exit 1
            }
            git apply $vr
            if ($LASTEXITCODE -ne 0) { Write-Error "(Q) git apply failed"; exit 1 }
          }
          $clickFn2 = if ((Get-Content -Raw $actions) -match '(?s)const handleClick = \(\) => \{(.+?)\};') { $matches[1] } else { '' }
          if ($clickFn2 -match 'clearWorkspaceAttention\(workspaceId\)') { Write-Error "(Q) bulk-clear still present in handleClick after apply"; exit 1 }
          Write-Host "(Q) v2-per-tab-read applied (workspace click no longer bulk-clears every terminal's unread state)"

          # (R) Windows shell fallback. The `default-shell` npm package
          #     returns whatever is configured as system default —
          #     commonly pwsh.exe — without verifying the binary is on
          #     disk. If PowerShell 7 isn't installed, every preset
          #     spawn throws "File not found" and the user gets
          #     "Failed to run preset open <uuid>: spawn failed
          #     (shell=pwsh.exe ...)" toasts. Validate the resolved
          #     shell against PATH+PATHEXT and fall back to cmd.exe
          #     when missing. Idempotent + fail-fast.
          $sf = '../patches/windows-shell-fallback.patch'
          if (-not (Test-Path $sf)) { Write-Error "(R) missing $sf in patches repo"; exit 1 }
          $envts = 'apps/desktop/src/main/lib/terminal/env.ts'
          if (-not (Test-Path $envts)) { Write-Error "(R) missing $envts"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'resolved shell "${resolvedDefaultShell}" not on PATH' $envts) {
            Write-Host "(R) windows-shell-fallback already present — skip"
          } else {

          $wli = 'apps/desktop/src/renderer/screens/main/components/WorkspaceSidebar/WorkspaceListItem/WorkspaceListItem.tsx'
          if (-not (Test-Path $wli)) { Write-Error "(O) missing $wli"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'terminalStatusesKey' $wli) {
            Write-Host "(O) per-terminal-dots already present — skip"
          } else {
            git apply --check $td 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Error "(O) per-terminal-dots.patch does not apply cleanly — WorkspaceListItem.tsx changed upstream; aborting rather than shipping with the per-terminal indicator broken. Regenerate patches/per-terminal-dots.patch against the new upstream."
              exit 1

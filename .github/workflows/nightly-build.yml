          if (-not (Test-Path $wptFile)) { Write-Error "(AP) $wptFile missing — did (N) apply?"; exit 1 }
          if (-not (Select-String -Quiet -SimpleMatch 'seedScanAllAsync' $wptFile)) { Write-Error "(AP) (AN) markers absent — (AP) MUST apply after (AN); fix ordering"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'pendingToolUseIds' $wptFile) {

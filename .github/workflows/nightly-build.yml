              Write-Host "(AP) watcher-pending-tools.patch does not apply cleanly (post AN). git apply --check output:"
              if (Test-Path $wptErr) { Get-Content $wptErr | ForEach-Object { Write-Host "    (AP-check) $_" } }
              Write-Error "(AP) watcher-pending-tools.patch failed to apply — watcher shape changed (N/AK/AJ/AN drift). Regenerate it against the POST-(AN) watcher."
              exit 1
            }
            git apply $wpt
            if ($LASTEXITCODE -ne 0) { Write-Error "(AP) git apply failed after a clean --check"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'function scanAskMarkers' $wptFile)) { Write-Error "(AP) scanAskMarkers missing after apply"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'subagentActiveUntil' $wptFile)) { Write-Error "(AP) subagent keepalive missing after apply"; exit 1 }
            Write-Host "(AP) watcher-dot-accuracy applied (no false-green during tools/subagents; deterministic ask-marker red)"
          }

          # (AQ) ask-marker-hook — install a Python PreToolUse + PostToolUse hook
          #      (matcher AskUserQuestion) into ~/.claude/settings.json, modeled on

          # (AC) windows-terminal-paste — make SYNTHETIC Ctrl+V paste in the terminal.
          #      Wispr Flow voice dictation copies its transcript to the clipboard then
          #      sends an OS-level SendInput Ctrl+V. Superset's terminal paste relies on
          #      the browser keydown->`paste` event (shouldBubbleClipboardShortcut, gated
          #      on event.code === "KeyV"), which Chrome only fires for TRUSTED REAL keys;
          #      synthetic keys fall through and xterm encodes ^V (0x16) into the PTY
          #      (Codex reads that as paste-image -> "failed to paste image"). Splices a
          #      Ctrl+V branch into the SHARED createTerminalKeyEventHandler (covers v1 +
          #      v2; both call installTerminalKeyEventHandler) just BEFORE its final
          #      `return true;`, so the branch runs ONLY for a Ctrl+V the clipboard-bubble
          #      check did NOT already handle — i.e. the synthetic case — leaving the
          #      (user-confirmed perfectly working) MANUAL Ctrl+V path untouched. Reads
          #      via navigator.clipboard.readText() (same API as right-click Paste; the
          #      sandboxed renderer has NO electron clipboard bridge) and terminal.paste()s
          #      the text. [wispr-diag]-instrumented so we can verify the intercept +
          #      readText result in main.log. Hard-aborts if the anchor is gone —
          #      regenerate rather than ship without terminal paste for voice input.
          $acFile = 'apps/desktop/src/renderer/lib/terminal/terminal-key-event-handler.ts'
          if (-not (Test-Path $acFile)) { Write-Error "(AC) $acFile missing in this upstream — re-anchor windows-terminal-paste for the new layout"; exit 1 }
          $acAbs = (Resolve-Path $acFile).Path
          $acSnippet = Get-Content -Raw '../scripts/fixup-snippets/windows-terminal-paste.snippet'
          if (-not $acSnippet) { Write-Error "(AC) missing scripts/fixup-snippets/windows-terminal-paste.snippet"; exit 1 }
          $acContent = [System.IO.File]::ReadAllText($acAbs)
          if ($acContent -match 'win-paste-intercept') {
            Write-Host "(AC) windows-terminal-paste already present — skip"
          } else {
            $acAnchor = "`n`t`treturn true;"
            $acIdx = $acContent.IndexOf($acAnchor)
            if ($acIdx -lt 0) { Write-Error "(AC) handler-final 'return true;' anchor not found in $acFile — createTerminalKeyEventHandler shape changed; re-anchor (AC) rather than ship without terminal paste for Wispr Flow voice input."; exit 1 }
            $acContent = $acContent.Insert($acIdx + 1, $acSnippet + "`n")
            [System.IO.File]::WriteAllText($acAbs, $acContent, (New-Object System.Text.UTF8Encoding $false))
            if (([System.IO.File]::ReadAllText($acAbs)) -notmatch 'win-paste-intercept') { Write-Error "(AC) win-paste-intercept marker missing after insert"; exit 1 }
            Write-Host "(AC) windows-terminal-paste inserted (deterministic, before createTerminalKeyEventHandler's final return true)"
          }

          # (Y) windows-force-foreground.patch
          #     focusMainWindow() (the second-instance / deep-link handler) did only
          #     show()+focus(), which Windows' foreground lock ignores — so
          #     relaunching Superset while its window was buried in z-order surfaced
          #     nothing (the window is visible per IsWindowVisible, just behind the
          #     app that holds the foreground; needed a manual Win32 raise to recover).
          #     Adds a brief always-on-top pin (exempt from the lock) to force the
          #     window to the top on Windows. Guard HARD-ABORTS on any apply
          #     failure — every build must include force-foreground; regenerate
          #     the patch on drift rather than ship without it.
          #     Marker: 'Windows holds a foreground lock'.
          $ff = '../patches/windows-force-foreground.patch'
          if (-not (Test-Path $ff)) { Write-Error "(Y) missing $ff in patches repo"; exit 1 }
          $ffFile = 'apps/desktop/src/main/index.ts'
          if (-not (Test-Path $ffFile)) { Write-Error "(Y) $ffFile is missing in this upstream — aborting; regenerate patches/windows-force-foreground.patch for the new layout"; exit 1 }
          if (Select-String -Quiet -SimpleMatch 'Windows holds a foreground lock' $ffFile) {
            Write-Host "(Y) force-foreground already present — skip"
          } else {
            $yErr = "$env:RUNNER_TEMP/y-apply-check.txt"
            git apply --check $ff 2>$yErr
            if ($LASTEXITCODE -ne 0) {
              Write-Host "(Y) windows-force-foreground.patch does not apply cleanly. git apply --check output:"
              if (Test-Path $yErr) { Get-Content $yErr | ForEach-Object { Write-Host "    (Y-check) $_" } }
              Write-Error "(Y) windows-force-foreground.patch failed to apply — ABORTING. Regenerate patches/windows-force-foreground.patch against this upstream."
              exit 1
            }
            git apply $ff
            if ($LASTEXITCODE -ne 0) { Write-Error "(Y) git apply failed after a clean --check"; exit 1 }
            if ((Get-Content -Raw $ffFile) -notmatch 'setAlwaysOnTop') { Write-Error "(Y) setAlwaysOnTop missing in $ffFile after apply"; exit 1 }
            Write-Host "(Y) windows-force-foreground applied (focusMainWindow raises past the Windows foreground lock; relaunch now surfaces a buried window)"
          }

          # (F) Stage the deterministic Bun-store native-payload repair script
          #     (root-cause fix for electron-builder's Bun collector on win-arm64)
          #     from this patches repo into the upstream clone.
          $mat = '../scripts/materialize-native-closure.sh'
          if (-not (Test-Path $mat)) { Write-Error "Missing $mat in patches repo"; exit 1 }
          New-Item -ItemType Directory -Force scripts | Out-Null
          Copy-Item $mat 'scripts/materialize-native-closure.sh' -Force
          Write-Host "(F) staged scripts/materialize-native-closure.sh"

          Write-Host "ARM64 arch fixup verified (A + B + C + D + E + G + H + I + J + K + L + M + N + O + P + Q + R + S + T + W + W.1 + AA + AB + AC + Y + Z + F). (U, V, X disabled — see comments above; V/X were the Wispr Flow regression, AC is the Wispr Flow paste fix.)"

          # Reaching here means EVERY patch/fixup applied — ALL guards now
          # hard-abort (Write-Error + exit 1) on any failure, so a build either
          # contains the complete patch set or fails loudly. There are no
          # skip-not-abort guards anymore: every build = latest upstream + the
          # full set (L M N O P Q R S T V X W Y Z), never partial. A trailing
          # `git apply --check`/Get-Content can leave $LASTEXITCODE=1 even on
          # success, so force a clean exit to reflect "all fixups applied".
          exit 0

      - name: Install dependencies
        working-directory: superset
        shell: bash
        env:
          # Skip the flaky @electron/rebuild postinstall (install:deps). On
          # win-arm64 it can't build native trustedDeps; the deterministic
          # Bun-store payload repair (below) handles them instead. This matches
          # the sequence validated on real ARM64 hardware.
          SUPERSET_POSTINSTALL_RUNNING: '1'
        run: |
          # Resilient `bun install`. Upstream's bunfig sets
          # minimumReleaseAge (72h); a fresh upstream release can pin deps
          # published inside that window, which makes `bun install` fail
          # loud (e.g. the whole expo stack: "No version matching ...
          # blocked by minimum-release-age"). That is a timing race, not a
          # breakage — an older version of each package is already aged
          # past the gate. On such a failure we resolve every blocked
          # package to its latest aged-safe version (<= upstream's pin) via
          # scripts/resolve-release-age.mjs and retry, so the nightly never
          # has to wait a night for packages to age. Any OTHER install
          # failure fails the step immediately — no masking.
          log="$RUNNER_TEMP/bun-install.log"
          for attempt in 1 2 3 4 5; do
            echo "::group::bun install (attempt $attempt)"
            if bun install 2>&1 | tee "$log"; then
              echo "::endgroup::"
              echo "bun install succeeded on attempt $attempt."
              exit 0
            fi
            echo "::endgroup::"
            if ! grep -q "minimum-release-age" "$log"; then
              echo "::error::bun install failed for a reason other than minimum-release-age."
              exit 1
            fi
            echo "Detected minimum-release-age block(s); resolving to aged-safe versions..."
            node ../scripts/resolve-release-age.mjs "$log"
          done
          echo "::error::Still blocked by minimum-release-age after 5 attempts."
          exit 1

      - name: Generate file icons
        working-directory: superset/apps/desktop
        shell: bash
        run: bun run generate:icons

      - name: Build app
        working-directory: superset/apps/desktop
        shell: bash
        run: bun run compile:app

      # Post-compile hard-fail: confirm (V) screenReaderMode stayed FALSE in BOTH
      # the v1 (config-*.js) and v2 (terminal-runtime-*.js) built renderer chunks.
      # (V) is now DISABLED (it was the Wispr Flow root cause — see the (V) comment
      # in the patch-fixup step). This guard is INVERTED from its old form: it
      # hard-aborts if screenReaderMode is truthy, so the regression can never
      # silently come back. A missing/absent flag is fine (xterm defaults false);
      # an explicit `screenReaderMode: false` is also fine.
      - name: Verify (V) screenReaderMode stayed false in both v1 and v2 renderer bundles
        working-directory: superset/apps/desktop
        shell: bash
        run: |
          set -euo pipefail
          assets_dir="dist/renderer/assets"
          [ -d "$assets_dir" ] || { echo "::error::renderer assets dir not found at $assets_dir"; exit 1; }
          v1_chunk=$(ls -1 "$assets_dir"/config-*.js 2>/dev/null | head -1 || true)
          v2_chunk=$(ls -1 "$assets_dir"/terminal-runtime-*.js 2>/dev/null | head -1 || true)
          [ -n "$v1_chunk" ] || { echo "::error::v1 config-*.js chunk not found in $assets_dir (renderer build layout changed?)"; exit 1; }
          [ -n "$v2_chunk" ] || { echo "::error::v2 terminal-runtime-*.js chunk not found in $assets_dir (renderer build layout changed?)"; exit 1; }
          echo "v1 chunk: $v1_chunk"
          echo "v2 chunk: $v2_chunk"
          # Hard-abort if screenReaderMode is truthy (`true` or minified `!0`) in either chunk.
          if grep -qE 'screenReaderMode[[:space:]]*:[[:space:]]*(true|!0)' "$v1_chunk"; then
            echo "::error::(V) screenReaderMode is TRUTHY in v1 chunk $v1_chunk — (V) must stay disabled; screenReaderMode:true is the Wispr Flow regression"
            grep -n screenReaderMode "$v1_chunk" || true
            exit 1
          fi
          if grep -qE 'screenReaderMode[[:space:]]*:[[:space:]]*(true|!0)' "$v2_chunk"; then
            echo "::error::(V) screenReaderMode is TRUTHY in v2 chunk $v2_chunk — (V) must stay disabled; screenReaderMode:true is the Wispr Flow regression"
            grep -n screenReaderMode "$v2_chunk" || true
            exit 1
          fi
          echo "(V) verified disabled in both renderer bundles — screenReaderMode is false, so xterm forwards Wispr Flow's insertText to the PTY."

      - name: Fetch @libsql + @anush008/tokenizers win32-arm64 + materialize native closure
        working-directory: superset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # libsql version Superset resolved (Turso publishes no win-arm64 build;
          # khairm/libsql-windows-arm64 publishes a per-version Release of it).
          LV=$(ls -d node_modules/.bun/libsql@* 2>/dev/null | sed 's#.*/libsql@##' | sort -V | tail -1)
          [ -n "$LV" ] || { echo "::error::could not determine resolved libsql version"; exit 1; }
          echo "Resolved libsql: $LV"
          rm -rf libsql-dl libsql-arm64
          if ! gh release download "$LV" --repo khairm/libsql-windows-arm64 \
                 -p 'libsql-win32-arm64-msvc.tar.gz' -p 'libsql-win32-arm64-msvc.tar.gz.sha256' -D libsql-dl; then
            echo "::error::No @libsql/win32-arm64-msvc Release for libsql $LV in khairm/libsql-windows-arm64."
            echo "::error::Trigger that repo's nightly (workflow_dispatch -f libsql_version=$LV) then re-run."
            exit 1
          fi
          ( cd libsql-dl && sha256sum -c libsql-win32-arm64-msvc.tar.gz.sha256 )
          mkdir -p libsql-arm64
          tar -xzf libsql-dl/libsql-win32-arm64-msvc.tar.gz -C libsql-arm64
          [ -f libsql-arm64/index.node ] || { echo "::error::libsql artifact missing index.node"; exit 1; }

          # @anush008/tokenizers version Superset resolved (fastembed dep; the
          # author publishes no win-arm64 build — khairm/tokenizers-windows-arm64
          # publishes a per-version Release of it). N-API: one build, any Electron.
          TV=$(ls -d node_modules/.bun/@anush008+tokenizers@* 2>/dev/null | sed 's#.*/@anush008+tokenizers@##' | sort -V | tail -1)
          [ -n "$TV" ] || { echo "::error::could not determine resolved @anush008/tokenizers version"; exit 1; }
          echo "Resolved @anush008/tokenizers: $TV"
          rm -rf tok-dl tokenizers-arm64
          if ! gh release download "$TV" --repo khairm/tokenizers-windows-arm64 \
                 -p 'tokenizers-win32-arm64-msvc.tar.gz' -p 'tokenizers-win32-arm64-msvc.tar.gz.sha256' -D tok-dl; then
            echo "::error::No @anush008/tokenizers-win32-arm64-msvc Release for tokenizers $TV in khairm/tokenizers-windows-arm64."
            echo "::error::Trigger that repo's nightly (workflow_dispatch -f tokenizers_version=$TV) then re-run."
            exit 1
          fi
          ( cd tok-dl && sha256sum -c tokenizers-win32-arm64-msvc.tar.gz.sha256 )
          mkdir -p tokenizers-arm64
          tar -xzf tok-dl/tokenizers-win32-arm64-msvc.tar.gz -C tokenizers-arm64
          [ -f tokenizers-arm64/tokenizers.win32-arm64-msvc.node ] || { echo "::error::tokenizers artifact missing .node"; exit 1; }

          # Electron ABI from the resolved electron major (electron N -> NODE_MODULE_VERSION N+103).
          EM=$(ls -d node_modules/.bun/electron@* 2>/dev/null | sed 's#.*/electron@##' | cut -d. -f1 | sort -n | tail -1)
          ABI=$((EM + 103))
          echo "electron major=$EM -> ABI=$ABI"
          export ELECTRON_ABI="$ABI" LIBSQL_ARM64_DIR="$PWD/libsql-arm64" TOKENIZERS_ARM64_DIR="$PWD/tokenizers-arm64"
          bash scripts/materialize-native-closure.sh
          # persist for later steps
          echo "ELECTRON_ABI=$ABI" >> "$GITHUB_ENV"
          echo "LIBSQL_ARM64_DIR=$PWD/libsql-arm64" >> "$GITHUB_ENV"
          echo "TOKENIZERS_ARM64_DIR=$PWD/tokenizers-arm64" >> "$GITHUB_ENV"

      - name: Prepare native modules (ARM64 target)
        working-directory: superset/apps/desktop
        shell: bash
        env:
          TARGET_ARCH: arm64
          TARGET_PLATFORM: win32
        run: bun run copy:native-modules

      - name: Validate native runtime (ARM64 fail-fast gate)
        working-directory: superset
        shell: bash
        env:
          TARGET_ARCH: arm64
          TARGET_PLATFORM: win32
        run: |
          set -euo pipefail
          # copy:native-modules can rewrite the @libsql dir — re-assert (idempotent).
          bash scripts/materialize-native-closure.sh
          cd apps/desktop
          bun run validate:native-runtime

      - name: Build Windows ARM64 installer
        working-directory: superset/apps/desktop
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Native modules that @electron/rebuild compiles FROM SOURCE (e.g.
          # native-keymap@3.3.9) use V8 APIs Electron 40 deprecated
          # (v8::Object::GetAlignedPointerFromInternalField). MSVC emits C4996
          # and these modules build with warnings-as-errors, so node-gyp fails
          # ("node-gyp failed to rebuild 'native-keymap'", run 26488351649). The
          # API still works at runtime in Electron 40 — this is a deprecation, not
          # a removal. cl.exe reads the CL env var and prepends it to every compile,
          # so /wd4996 disables just that one warning for ALL native rebuilds
          # (deterministic fix; a prior build happened to use a prebuilt and dodged
          # the source compile, but the float can't be relied on). Harmless to the
          # other native modules, which already compiled clean.
          CL: '/wd4996'
        run: |
          set -euo pipefail
          npx electron-builder --win --arm64 --publish never --config electron-builder.ts
          echo "--- release dir ---"
          ls -la release || true

      - name: Verify packaged native closure (ARM64 fail-fast gate)
        working-directory: superset/apps/desktop
        shell: bash
        run: |
          set -euo pipefail
          # The unpacked app electron-builder produced before NSIS packaging.
          APP="release/win-arm64-unpacked"
          [ -d "$APP" ] || { echo "::error::$APP not found"; exit 1; }
          pearch() { od -An -tx1 -j"$(( $(od -An -tu4 -j60 -N4 "$1"|tr -d ' ')+4 ))" -N2 "$1" | tr -d ' '; }
          fail=0
          # 1) Superset.exe must be native ARM64.
          m="$(pearch "$APP/Superset.exe")"
          [ "$m" = 64aa ] && echo "OK  Superset.exe ARM64" || { echo "::error::Superset.exe not ARM64 (0x$m)"; fail=1; }
          # 2) @anush008/tokenizers-win32-arm64-msvc must be packaged (extraResources,
          #    outside the asar) — this is the gap that crashed prior builds.
          TOK="$APP/resources/node_modules/@anush008/tokenizers-win32-arm64-msvc/tokenizers.win32-arm64-msvc.node"
          if [ -f "$TOK" ] && [ "$(pearch "$TOK")" = 64aa ]; then
            echo "OK  @anush008/tokenizers-win32-arm64-msvc packaged (ARM64)"
          else
            echo "::error::@anush008/tokenizers-win32-arm64-msvc missing/!ARM64 at $TOK"; fail=1
          fi
          # 3) Every win32-arm64 native .node in the unpacked app must be ARM64,
          #    and no win32-arm64 path may contain an x64 binary.
          while IFS= read -r f; do
            case "$f" in
              *darwin*|*linux*|*musl*|*win32-ia32*|*win32-x64*|*win32_x64*|*win32_ia32*) continue ;;
            esac
            a="$(pearch "$f" 2>/dev/null || echo '')"
            if echo "$f" | grep -Eqi 'win32.?arm64|win32_arm64'; then
              [ "$a" = 64aa ] || { echo "::error::win32-arm64 native not ARM64: $f (0x$a)"; fail=1; }
            fi
          done < <(find "$APP/resources" -name '*.node' 2>/dev/null)
          [ "$fail" = 0 ] || { echo "::error::packaged native closure verification FAILED"; exit 1; }
          echo "Packaged native closure verified (ARM64)."

      - name: Archive patched source
        shell: bash
        run: tar -czf superset-patched-source.tar.gz --exclude='node_modules' --exclude='.bun' --exclude='dist' --exclude='release' superset/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.upstream_version }}"
          RELEASE_TAG="${{ needs.check.outputs.release_tag }}"
          IS_BETA="${{ needs.check.outputs.is_beta }}"

          PRERELEASE_FLAG=""
          TITLE_SUFFIX=""
          if [ "$IS_BETA" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
            TITLE_SUFFIX=" [Beta]"
            # Delete existing beta release if it exists so we can recreate it
            gh release delete "$RELEASE_TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true
            git push --delete origin "refs/tags/$RELEASE_TAG" 2>/dev/null || true
          fi

          # electron-builder emits an -arm64 .exe artifact; resolve it resiliently.
          ASSET=$(ls superset/apps/desktop/release/*arm64*.exe 2>/dev/null | head -1 || true)
          if [ -z "$ASSET" ]; then
            ASSET=$(ls superset/apps/desktop/release/*.exe 2>/dev/null | grep -v blockmap | head -1 || true)
          fi
          if [ -z "$ASSET" ]; then
            echo "ERROR: no .exe produced in release/"
            ls -la superset/apps/desktop/release || true
            exit 1
          fi
          echo "Publishing asset: $ASSET"

          gh release create "$RELEASE_TAG" \
            "$ASSET" \
            superset-patched-source.tar.gz \
            --repo ${{ github.repository }} \
            --title "Superset $VERSION (Windows ARM64)${TITLE_SUFFIX}" \
            $PRERELEASE_FLAG \
            --notes "Automated **native Windows ARM64** build of [superset-sh/superset](https://github.com/superset-sh/superset) $VERSION.

          Built with Windows compatibility patches applied via AI agent (see [PATCHES.md](https://github.com/${{ github.repository }}/blob/main/PATCHES.md)). ARM64 native-module values are enforced deterministically by the workflow's *ARM64 arch fixup* step. Installer is **unsigned**.

          **Assets:**
          - \`$(basename "$ASSET")\` — native Windows ARM64 installer
          - \`superset-patched-source.tar.gz\` — modified source code (for reviewing the AI-applied changes against the upstream tag)

          Not the official superset-sh distribution."

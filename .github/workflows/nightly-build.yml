              Write-Error "(AR) render-dot-logging.patch failed to apply — store.ts (post-P) or main.ts (post-N/W/AN) shape changed. Regenerate it."
              exit 1
            }
            git apply $rdl
            if ($LASTEXITCODE -ne 0) { Write-Error "(AR) git apply failed after a clean --check"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'render-dot' $rdlMain)) { Write-Error "(AR) render-dot main.ts forwarder missing after apply"; exit 1 }
            Write-Host "(AR) render-dot-logging applied (per-second rendered-dot snapshot -> ~/.superset/agent-dot-render.log)"
          }

          # (AS) windows-notify-hook — RETIRE the JSONL "System 1" timing heuristics
          #      for Claude and drive Claude dots PURELY event-driven via a Windows-safe
          #      Python hook (superset-notify.py) that POSTs each lifecycle event to the
          #      host-service ($SUPERSET_HOST_AGENT_HOOK_URL) — reviving what the dead
          #      bash notify.sh did (Start->working, Stop->review, PermissionRequest->red;
          #      keyed by SUPERSET_TERMINAL_ID, instant, no polling/timers). mergeNotifyHook
          #      registers it (Claude settings.json) on UserPromptSubmit/Stop/SessionEnd/
          #      Notification(permission_prompt)/PreToolUse(AskUserQuestion)/PostToolUse,
          #      and self-heals stale (AQ) ask-marker entries. The watcher gates ALL Claude
          #      main-agent JSONL lifecycle in processFile (keeping ONLY the background-
          #      subagent mirror, which force-asserts YELLOW, + an interrupt->review release
          #      since Claude fires no hook on ESC). DELETES the (AP) idle/pending-tool
          #      heuristics + the (AQ) ask-marker path for Claude — no 45s idle, no TTLs
          #      (the owner banned timing fallbacks). Codex keeps the JSONL state machine
          #      UNCHANGED. Authored on top of (AP)+(AQ)+(AR); MUST apply AFTER them.
          $wnh = '../patches/windows-notify-hook.patch'
          $wnhWatch = 'apps/desktop/src/main/lib/agent-jsonl-watcher/agent-jsonl-watcher.ts'
          $wnhPane = 'apps/desktop/src/main/lib/agent-jsonl-watcher/pane-map-hook.ts'

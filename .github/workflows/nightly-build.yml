              Write-Error "(AQ) ask-marker-hook.patch failed to apply — pane-map-hook.ts shape changed (N drift). Regenerate against post-(N) pane-map-hook."
              exit 1
            }
            git apply $amh
            if ($LASTEXITCODE -ne 0) { Write-Error "(AQ) git apply failed after a clean --check"; exit 1 }
            if (-not (Select-String -Quiet -SimpleMatch 'ASK_MARKER_SCRIPT' $amhFile)) { Write-Error "(AQ) ask-marker script missing after apply"; exit 1 }
            Write-Host "(AQ) ask-marker-hook applied (deterministic AskUserQuestion red via Python marker hook)"
          }

          # (AR) render-dot-logging — DIAGNOSTIC, no behaviour change. Snapshot every
          #      rendered dot's status once per second from the v2-notifications store
          #      to a SEPARATE log (~/.superset/agent-dot-render.log) so the
          #      actually-rendered colour can be matched against the watcher emit log
          #      by source key + workspaceId. Renderer store.ts (post-P) emits

          #      edits agent-jsonl-watcher.ts); AK and AJ touch non-overlapping
          #      regions so plain git apply succeeds in this order. (NOTE: the
          #      (AI) v2-dots-prune patch was REVERTED — it
          #      wrongly removed live sources inside Superset, causing "no dot".)
          $wp = '../patches/watcher-poll-fallback.patch'
          $wpFile = 'apps/desktop/src/main/lib/agent-jsonl-watcher/agent-jsonl-watcher.ts'
